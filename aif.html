<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المحادثة الصوتية</title>
  <style>
    body {
      margin: 0;
      background: #0a1020;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Cairo', sans-serif;
      color: #f0f4ff;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .status {
      font-size: 1.2rem;
      background: rgba(255,255,255,0.05);
      padding: 20px 30px;
      border-radius: 40px;
      border: 1px solid rgba(2,28,164,0.2);
      display: inline-block;
    }
    .status i {
      color: #4a7aff;
      margin-left: 10px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.9); }
    }
    .text-box {
      margin-top: 30px;
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(2,28,164,0.1);
      min-height: 80px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      word-break: break-word;
    }
    .btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #021ca4, #1a3a9e);
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
    }
    .btn:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status">
      <i class="fas fa-microphone"></i> جاري الاستماع...
    </div>
    <div class="text-box" id="resultText">انتظر الكلام...</div>
    <button class="btn" onclick="restartRecognition()">🔄 إعادة الاستماع</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
  <script>
    let recognition = null;
    let isListening = false;

    function initRecognition() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        document.getElementById('resultText').textContent = '⚠️ المتصفح لا يدعم التعرف على الصوت. استخدم Chrome.';
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'ar-SA';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = function(event) {
        let finalText = '';
        let interimText = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          const transcript = event.results[i][0].transcript;
          if (event.results[i].isFinal) {
            finalText += transcript;
          } else {
            interimText += transcript;
          }
        }
        if (finalText) {
          document.getElementById('resultText').textContent = '🗣️ ' + finalText;
          // إرسال النص إلى الصفحة الأم
          window.parent.postMessage({ type: 'voice', text: finalText }, '*');
        } else if (interimText) {
          document.getElementById('resultText').textContent = '⏳ ' + interimText;
        }
      };

      recognition.onerror = function(event) {
        console.warn('خطأ:', event.error);
        if (event.error === 'not-allowed') {
          document.getElementById('resultText').textContent = '❌ يرجى السماح باستخدام الميكروفون في إعدادات المتصفح.';
        } else if (event.error === 'no-speech') {
          document.getElementById('resultText').textContent = '🔇 لم يتم سماع صوت، حاول مرة أخرى.';
          // إعادة التشغيل تلقائياً بعد ثانية
          setTimeout(() => { if (recognition) recognition.start(); }, 1500);
        } else {
          document.getElementById('resultText').textContent = '⚠️ خطأ: ' + event.error;
        }
        isListening = false;
      };

      recognition.onend = function() {
        isListening = false;
        // إعادة التشغيل تلقائياً للحفاظ على الاستماع المستمر
        if (recognition) {
          try {
            recognition.start();
            isListening = true;
          } catch (e) {
            console.warn('فشل إعادة التشغيل:', e);
          }
        }
      };

      // طلب الإذن فوراً
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ audio: true })
          .then(function(stream) {
            window.audioStream = stream;
            startRecognition();
          })
          .catch(function(err) {
            document.getElementById('resultText').textContent = '❌ تم رفض الإذن، اذهب إلى إعدادات الموقع واسمح بالميكروفون.';
            console.warn(err);
          });
      } else {
        document.getElementById('resultText').textContent = '⚠️ لا يمكن الوصول إلى الميكروفون.';
      }
    }

    function startRecognition() {
      if (recognition && !isListening) {
        try {
          recognition.start();
          isListening = true;
          document.getElementById('resultText').textContent = '🎤 جاري الاستماع...';
        } catch (e) {
          console.warn('خطأ بدء الاستماع:', e);
        }
      }
    }

    function restartRecognition() {
      if (recognition) {
        try {
          recognition.stop();
        } catch (e) {}
        isListening = false;
        setTimeout(() => startRecognition(), 300);
      }
    }

    // التهيئة عند تحميل الصفحة
    window.addEventListener('load', initRecognition);

    // تنظيف عند إغلاق المودال (اختياري)
    window.addEventListener('beforeunload', function() {
      if (recognition) {
        try { recognition.stop(); } catch (e) {}
      }
      if (window.audioStream) {
        window.audioStream.getTracks().forEach(t => t.stop());
      }
    });
  </script>
</body>
</html>
