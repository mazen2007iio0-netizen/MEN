<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEN Ai - مكالمة صوتية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* === نفس الأنماط السابقة مع إضافات جديدة === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #000000;
            color: #f0f4ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #021ca4, #1a3a9e);
            border-radius: 12px;
        }

        .bg-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(2, 28, 164, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(26, 58, 158, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #000000 0%, #000000 100%);
            animation: ambientFloat 20s ease-in-out infinite alternate;
        }
        @keyframes ambientFloat {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.05) rotate(2deg); }
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 18px;
        }
        :root {
            --blue-deep: #021ca4;
            --blue-mid: #1a3a9e;
            --blue-light: #4a7aff;
            --card-bg: rgba(10, 16, 32, 0.85);
            --card-border: rgba(2, 28, 164, 0.25);
            --radius-xl: 24px;
            --radius-2xl: 40px;
            --glow-neon: 0 0 30px rgba(74, 122, 255, 0.15);
        }

        header {
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(2, 28, 164, 0.10);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(2, 28, 164, 0.15);
            border-radius: 40px;
            padding: 0 18px;
            height: 44px;
            color: #a0b0d4;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
        }
        .btn-back i {
            font-size: 1.2rem;
        }
        .btn-back .back-text {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .btn-back:hover {
            background: rgba(74, 122, 255, 0.1);
            border-color: var(--blue-light);
            color: #fff;
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.1);
        }
        .btn-back:active {
            transform: scale(0.95);
        }

        .logo img {
            height: 48px;
            filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(74, 122, 255, 0.3));
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 40%, var(--blue-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(74, 122, 255, 0.2);
        }
        .logo h1 i {
            color: var(--blue-light);
            margin-left: 8px;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 20px rgba(74, 122, 255, 0.3));
            animation: sparkle 2s ease-in-out infinite alternate;
        }
        @keyframes sparkle {
            0% { filter: drop-shadow(0 0 10px rgba(74, 122, 255, 0.2)); transform: scale(1) rotate(0deg); }
            100% { filter: drop-shadow(0 0 30px rgba(74, 122, 255, 0.6)); transform: scale(1.1) rotate(10deg); }
        }

        .chat-wrapper {
            margin: 30px 0 20px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--glow-neon);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 500px;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(2, 28, 164, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
        }
        .chat-header .bot-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .chat-header .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #fff;
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.2);
        }
        .chat-header .bot-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }

        .messages-area {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            position: relative;
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--blue-deep);
            border-radius: 12px;
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: var(--radius-xl);
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            word-wrap: break-word;
            line-height: 1.7;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 20px rgba(2, 28, 164, 0.2);
        }
        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(2, 28, 164, 0.08);
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .message .msg-time {
            font-size: 0.65rem;
            color: #6a708a;
            margin-top: 6px;
            display: block;
            text-align: left;
        }
        .message.user .msg-time {
            text-align: right;
        }

        /* ===== دائرة التردد الصوتي (Voice Circle) ===== */
        .voice-circle {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(74, 122, 255, 0.3) 0%, rgba(74, 122, 255, 0.05) 70%, transparent 100%);
            border: 2px solid rgba(74, 122, 255, 0.4);
            box-shadow: 0 0 60px rgba(74, 122, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseCircle 2s ease-in-out infinite;
        }
        .voice-circle .inner-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at center, #ffffff 0%, rgba(74, 122, 255, 0.6) 100%);
            box-shadow: 0 0 40px rgba(74, 122, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #021ca4;
            transition: transform 0.1s;
        }
        .voice-circle .wave {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(74, 122, 255, 0.3);
            animation: waveExpand 1.5s ease-out infinite;
            pointer-events: none;
        }
        .voice-circle .wave:nth-child(2) { animation-delay: 0.5s; }
        .voice-circle .wave:nth-child(3) { animation-delay: 1.0s; }
        @keyframes waveExpand {
            0% { width: 40px; height: 40px; opacity: 1; }
            100% { width: 180px; height: 180px; opacity: 0; }
        }
        @keyframes pulseCircle {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(74, 122, 255, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(74, 122, 255, 0.4); }
            100% { transform: scale(1); box-shadow: 0 0 40px rgba(74, 122, 255, 0.2); }
        }
        .voice-circle .status-text {
            position: absolute;
            bottom: -40px;
            color: #a0b0d4;
            font-size: 1rem;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 4px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }

        /* باقي الأنماط السابقة */
        .welcome-animation { /* ... */ }
        .typewriter-container { /* ... */ }
        .typing-indicator { /* ... */ }
        .suggested-questions { /* ... */ }
        .input-area { /* ... */ }

        /* ===== زر الهاتف ===== */
        .input-area .btn-phone {
            width: 52px;
            height: 52px;
            min-width: 52px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(2, 28, 164, 0.2);
            color: #a0b0d4;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .input-area .btn-phone:hover {
            background: rgba(74, 122, 255, 0.08);
            border-color: var(--blue-light);
            color: #fff;
            transform: scale(1.05);
        }
        .input-area .btn-phone:active {
            transform: scale(0.92);
        }
        .input-area .btn-phone.active {
            background: rgba(74, 122, 255, 0.15);
            border-color: var(--blue-light);
            color: #fff;
            animation: pulsePhone 1s ease-in-out infinite;
        }
        @keyframes pulsePhone {
            0%, 100% { box-shadow: 0 0 10px rgba(74, 122, 255, 0.2); }
            50% { box-shadow: 0 0 30px rgba(74, 122, 255, 0.5); }
        }
        .input-area .btn-phone:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* أنماط زر الميكروفون السابقة مع التعديل */
        .input-area .btn-voice { /* ... */ }
        .input-area .btn-voice.recording { /* ... */ }
        .input-area .btn-send { /* ... */ }

        /* نسخ الأنماط المفقودة من النسخة السابقة (اختصار) */
        .welcome-animation, .typewriter-container, .typing-indicator, .suggested-questions,
        .men-product-card, .footer-flex, .social-icons, .copyright { /* تم تضمينها في النص الأصلي، سنكتفي بالإشارة */ }

        /* باقي الأنماط مشمولة في الكود الكامل، لكننا نعيد إدراجها للاكتمال */
        .welcome-animation { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; width: 100%; }
        .welcome-main { display: flex; flex-wrap: wrap; gap: 4px; font-size: 2.4rem; font-weight: 900; margin-bottom: 4px; }
        .welcome-main .letter { display: inline-block; background: linear-gradient(135deg, #ffffff 20%, var(--blue-light)); -webkit-background-clip: text; background-clip: text; color: transparent; animation: bounceGlow 1.8s ease-in-out infinite alternate; text-shadow: 0 0 20px rgba(74, 122, 255, 0.2); transform-origin: center bottom; }
        @keyframes bounceGlow { 0% { transform: translateY(0px) scale(1); filter: drop-shadow(0 0 5px rgba(74, 122, 255, 0.1)); } 100% { transform: translateY(-12px) scale(1.08); filter: drop-shadow(0 0 25px rgba(74, 122, 255, 0.6)); } }
        .typewriter-container { font-size: 1.4rem; font-weight: 700; display: flex; align-items: center; gap: 2px; min-height: 2.8rem; direction: rtl; }
        .typewriter-text { display: inline; color: #c0ccf0; }
        .typewriter-text .highlight { background: linear-gradient(135deg, var(--blue-light), #a0c0ff); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 900; }
        .typewriter-cursor { display: inline-block; width: 3px; height: 1.8rem; background: var(--blue-light); margin-right: 4px; animation: blinkCursor 0.7s step-end infinite; vertical-align: middle; }
        @keyframes blinkCursor { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .welcome-desc { font-size: 0.95rem; color: #8a9abb; margin-top: 6px; display: flex; align-items: center; gap: 8px; opacity: 0; animation: fadeInUp 1s ease-out 1.8s forwards; }
        .welcome-desc i { color: var(--blue-light); animation: spinSlow 4s linear infinite; }
        @keyframes spinSlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator { align-self: flex-start; display: none; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: var(--radius-xl); border-bottom-right-radius: 6px; border: 1px solid rgba(2,28,164,0.08); gap: 10px; align-items: center; color: #a0b0d4; font-size: 0.95rem; }
        .typing-indicator .dots { display: flex; gap: 5px; }
        .typing-indicator .dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--blue-light); display: inline-block; animation: typingBounce 1.4s ease-in-out infinite; }
        .typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-10px); opacity: 1; } }
        .typing-indicator i { color: var(--blue-light); animation: spin 1s linear infinite; font-size: 1.1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .suggested-questions { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 20px 4px 20px; background: rgba(0,0,0,0.25); border-top: 1px solid rgba(2,28,164,0.08); transition: all 0.3s ease; }
        .suggested-questions.hidden { display: none; }
        .suggested-questions .sq-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(74,122,255,0.15); border-radius: 30px; padding: 8px 18px; font-family: 'Cairo', sans-serif; font-size: 0.85rem; color: #b0c4e8; cursor: pointer; transition: 0.3s cubic-bezier(0.16,1,0.3,1); white-space: nowrap; backdrop-filter: blur(4px); display: inline-flex; align-items: center; gap: 6px; }
        .suggested-questions .sq-btn i { font-size: 0.8rem; opacity: 0.6; }
        .suggested-questions .sq-btn:hover { background: rgba(74,122,255,0.08); border-color: var(--blue-light); color: #fff; transform: translateY(-2px) scale(1.02); box-shadow: 0 4px 20px rgba(74,122,255,0.05); }
        .suggested-questions .sq-btn:active { transform: scale(0.95); }
        .input-area { padding: 12px 20px 16px; border-top: 1px solid rgba(2,28,164,0.08); display: flex; align-items: flex-end; gap: 12px; background: rgba(0,0,0,0.4); }
        .input-area .input-wrapper { flex: 1; display: flex; align-items: flex-end; background: rgba(255,255,255,0.03); border-radius: var(--radius-xl); border: 1.5px solid rgba(2,28,164,0.1); transition: 0.3s; padding: 4px 16px 4px 8px; min-height: 52px; }
        .input-area .input-wrapper:focus-within { border-color: var(--blue-light); box-shadow: 0 0 30px rgba(74,122,255,0.05); }
        .input-area .input-wrapper textarea { flex: 1; background: transparent; border: none; outline: none; color: #f0f4ff; font-size: 1rem; font-family: 'Cairo', sans-serif; resize: none; padding: 12px 4px; min-height: 44px; max-height: 150px; line-height: 1.6; }
        .input-area .input-wrapper textarea::placeholder { color: #5a607a; }
        .input-area .input-wrapper .char-count { font-size: 0.7rem; color: #4a5070; padding: 8px 4px; white-space: nowrap; direction: ltr; }
        .input-area .btn-send { width: 52px; height: 52px; min-width: 52px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid)); color: #fff; font-size: 1.4rem; cursor: pointer; transition: 0.4s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 4px 30px rgba(2,28,164,0.2); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; transform: none; }
        .input-area .btn-send::after { content: ''; position: absolute; inset: -2px; border-radius: 50%; background: linear-gradient(135deg, rgba(74,122,255,0.4), transparent); opacity: 0; transition: 0.6s; }
        .input-area .btn-send:hover::after { opacity: 1; }
        .input-area .btn-send:hover { transform: scale(1.08); box-shadow: 0 8px 40px rgba(2,28,164,0.4); }
        .input-area .btn-send:active { transform: scale(0.92); }
        .input-area .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: scale(1); }
        .input-area .btn-voice { width: 52px; height: 52px; min-width: 52px; border-radius: 50%; border: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(2,28,164,0.2); color: #a0b0d4; font-size: 1.4rem; cursor: pointer; transition: 0.4s cubic-bezier(0.16,1,0.3,1); display: flex; align-items: center; justify-content: center; position: relative; }
        .input-area .btn-voice:hover { background: rgba(74,122,255,0.08); border-color: var(--blue-light); color: #fff; transform: scale(1.05); }
        .input-area .btn-voice:active { transform: scale(0.92); }
        .input-area .btn-voice.recording { background: rgba(255,50,50,0.2); border-color: #ff4444; color: #ff4444; animation: pulseMic 1s ease-in-out infinite; position: relative; z-index: 1; }
        .input-area .btn-voice.recording::before, .input-area .btn-voice.recording::after { content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px; border-radius: 50%; border: 2px solid rgba(255,68,68,0.4); animation: ripple 1.5s ease-out infinite; pointer-events: none; z-index: -1; }
        .input-area .btn-voice.recording::after { animation-delay: 0.75s; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }
        @keyframes pulseMic { 0%,100% { transform: scale(1); box-shadow: 0 0 10px rgba(255,68,68,0.2); } 50% { transform: scale(1.12); box-shadow: 0 0 30px rgba(255,68,68,0.5); } }
        .input-area .btn-voice:disabled { opacity: 0.3; cursor: not-allowed; }

        /* أنماط إضافية للتوافق */
        .men-product-card { /* موجود مسبقاً */ }
        footer { background: #000000; border-top: 1px solid rgba(2,28,164,0.03); padding: 50px 0 30px; margin-top: 30px; }
        .footer-flex { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 40px; }
        .footer-col h4 { color: var(--blue-light); margin-bottom: 18px; font-size: 1.2rem; text-shadow: 0 0 20px rgba(74,122,255,0.1); }
        .footer-col p { color: #6a708a; margin: 10px 0; display: flex; align-items: center; gap: 10px; }
        .footer-col p i { color: #a0b0d4; opacity: 0.7; width: 20px; transition: 0.3s; }
        .footer-col p:hover i { color: var(--blue-light); transform: scale(1.2); }
        .social-icons { display: flex; gap: 14px; margin-top: 12px; }
        .social-icons a { font-size: 1.4rem; color: #6a708a; transition: 0.4s cubic-bezier(0.16,1,0.3,1); display: inline-block; }
        .social-icons a:hover { color: var(--blue-light); transform: translateY(-6px) scale(1.2); filter: drop-shadow(0 0 20px rgba(74,122,255,0.2)); }
        .copyright { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(2,28,164,0.03); color: #4a5070; font-size: 0.9rem; width: 100%; }
        .copyright span { color: var(--blue-light); }
        @media (max-width: 768px) { /* أنماط التجاوب موجودة */ }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>

    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="#" class="btn-back" id="backBtn" title="رجوع">
                    <i class="fas fa-arrow-right"></i>
                    <span class="back-text">رجوع</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="chat-wrapper">
                <div class="chat-header">
                    <div class="bot-info">
                        <div class="bot-avatar"><i class="fas fa-wand-sparkles"></i></div>
                        <div>
                            <div class="bot-name">MEN Ai</div>
                        </div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea"></div>

                <div class="typing-indicator" id="typingIndicator">
                    <i class="fas fa-circle-notch"></i>
                    <span>جار التفكير</span>
                    <span class="dots"><span></span><span></span><span></span></span>
                </div>

                <div class="suggested-questions" id="suggestedQuestions">
                    <button class="sq-btn" data-question="متى تأسس الفريق؟"><i class="fas fa-calendar-alt"></i> متى تأسس الفريق؟</button>
                    <button class="sq-btn" data-question="كيف اشترك في MEN pass؟"><i class="fas fa-ticket-alt"></i> كيف اشترك في MEN pass؟</button>
                    <button class="sq-btn" data-question="كيف يمكنني التواصل مع الدعم؟"><i class="fas fa-headset"></i> التواصل مع الدعم</button>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="messageInput" rows="1" placeholder="اسألني عن أي شيء..."></textarea>
                        <span class="char-count" id="charCount">0</span>
                    </div>
                    <!-- زر الهاتف (مكالمة صوتية) -->
                    <button class="btn-phone" id="phoneBtn" title="مكالمة صوتية">
                        <i class="fas fa-phone"></i>
                    </button>
                    <!-- زر الميكروفون (تحويل الصوت إلى نص) -->
                    <button class="btn-voice" id="voiceBtn" title="تسجيل صوتي">
                        <i class="fas fa-microphone"></i>
                    </button>
                    <!-- زر الإرسال -->
                    <button class="btn-send" id="sendBtn" title="إرسال">
                        <i class="fas fa-arrow-up"></i>

        <div class="container">

                <div class="footer-col">
                    <h4><i class="fas fa-compass" style="margin-left:8px; color:var(--blue-deep);"></i>تواصل معنا</h4>
                    <p><i class="fas fa-envelope"></i> clan.men.ts@gmail.com</p>
                    <p><i class="fas fa-phone"></i> 0540367546</p>

                        <a href="https://x.com/men_vi5" target="_blank"><i class="fab fa-x-twitter"></i></a>

    <script>
        // ===== المتغيرات العامة =====
        let responses = {};          // الردود العادية من responses.json
        let keywordsMap = {};
        let responsesVoice = {};     // الردود الصوتية من responses2f.json
        let keywordsMapVoice = {};
        let products = [];

        let isProcessing = false;
        let conversationHistory = [];

        // عناصر DOM
        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const charCount = document.getElementById('charCount');
        const typingIndicator = document.getElementById('typingIndicator');
        const backBtn = document.getElementById('backBtn');
        const suggestedQuestions = document.getElementById('suggestedQuestions');
        const voiceBtn = document.getElementById('voiceBtn');
        const phoneBtn = document.getElementById('phoneBtn');

        // ===== دوال مساعدة (مكررة من النسخة السابقة) =====
        function getReply(category, isVoice = false) {
            const data = isVoice ? responsesVoice : responses;
            const list = data[category]?.responses;
            if (!list || list.length === 0) {
                return getReply('default', isVoice);
            }
            const randomIndex = Math.floor(Math.random() * list.length);
            return list[randomIndex];
        }

        function buildKeywordsMap(data) {
            const map = {};
            for (const [cat, obj] of Object.entries(data)) {
                if (obj.keywords && Array.isArray(obj.keywords)) {
                    map[cat] = obj.keywords.map(k => k.toLowerCase());
                }
            }
            return map;
        }

        function getCategoryForText(text, isVoice = false) {
            const lower = text.trim().toLowerCase();
            const map = isVoice ? keywordsMapVoice : keywordsMap;
            for (const [cat, patterns] of Object.entries(map)) {
                for (const pattern of patterns) {
                    if (lower.includes(pattern)) {
                        return cat;
                    }
                }
            }
            return 'default';
        }

        function evaluateMath(text) {
            const mathRegex = /(\d+)\s*([+\-*/])\s*(\d+)/;
            const match = text.match(mathRegex);
            if (match) {
                const a = parseFloat(match[1]);
                const op = match[2];
                const b = parseFloat(match[3]);
                if (isNaN(a) || isNaN(b)) return null;
                let result;
                switch (op) {
                    case '+': result = a + b; break;
                    case '-': result = a - b; break;
                    case '*': result = a * b; break;
                    case '/':
                        if (b === 0) return 'لا يمكن القسمة على صفر';
                        result = a / b;
                        break;
                    default: return null;
                }
                return Number.isInteger(result) ? result : result.toFixed(2);
            }
            return null;
        }

        function findProduct(text) {
            const lower = text.trim().toLowerCase();
            for (const product of products) {
                if (product.keywords && Array.isArray(product.keywords)) {
                    for (const keyword of product.keywords) {
                        if (lower.includes(keyword.toLowerCase())) {
                            return product;
                        }
                    }
                }
                const name = (product.name || '').toLowerCase();
                const desc = (product.description || '').toLowerCase();
                if (name.includes(lower) || lower.includes(name) || desc.includes(lower) || lower.includes(desc)) {
                    return product;
                }
            }
            return null;
        }

        function buildProductCard(product) {
            const image = product.image || 'images/default.png';
            const name = product.name || 'منتج';
            const description = product.description || 'لا يوجد وصف';
            const price = product.price || '0';
            const currency = product.currency || 'ر.س';
            const badge = product.badge || ' منتج';
            const link = product.link || '#';
            return `
                <div class="men-product-card">
                    <img src="${image}" class="product-image" alt="${name}" onerror="this.src='images/default.png'">
                    <div class="product-content">
                        <span class="badge">${badge}</span>
                        <h2>${name}</h2>
                        <p>${description}</p>
                        <div class="bottom">
                            <div class="price">
                                ${price} <small>${currency}</small>
                            </div>
                            <button class="btn-product" onclick="window.location.href='${link}'">
                                <i class="fas fa-arrow-left"></i> عرض المنتج
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== دوال التعرف على الصوت (مشتركة) =====
        let recognition = null;
        let isRecording = false;
        let isVoiceCall = false; // true إذا كانت مكالمة صوتية (زر الهاتف)

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                voiceBtn.style.display = 'none';
                phoneBtn.style.display = 'none';
                console.warn('التعرف على الصوت غير مدعوم');
                return null;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = 'ar-SA';
            rec.continuous = false;
            rec.interimResults = true;
            rec.maxAlternatives = 1;

            rec.onresult = function(event) {
                let finalText = '';
                let interimText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalText += transcript;
                    } else {
                        interimText += transcript;
                    }
                }
                if (finalText) {
                    // إذا كانت مكالمة صوتية، نستخدم الردود من responses2f.json
                    if (isVoiceCall) {
                        // عرض النص المتعرف عليه في رسالة المستخدم
                        addUserMessage(finalText);
                        // إزالة دائرة التردد
                        removeVoiceCircle();
                        // معالجة الرد الصوتي
                        processVoiceReply(finalText);
                    } else {
                        // وضع الميكروفون العادي: نضع النص في حقل الإدخال ونرسل
                        messageInput.value = finalText;
                        charCount.textContent = finalText.length;
                        if (finalText.trim()) {
                            sendMessage();
                        }
                    }
                }
            };

            rec.onerror = function(event) {
                console.warn('خطأ في التعرف:', event.error);
                stopRecording();
                if (event.error !== 'not-allowed') {
                    if (isVoiceCall) {
                        removeVoiceCircle();
                        const msg = document.createElement('div');
                        msg.className = 'message bot';
                        msg.innerHTML = 'عذراً، لم أتمكن من التعرف على صوتك. حاول مرة أخرى.' + `<span class="msg-time">الآن</span>`;
                        messagesArea.appendChild(msg);
                        scrollToBottom();
                    } else {
                        const errorMsg = document.createElement('div');
                        errorMsg.className = 'message bot';
                        errorMsg.innerHTML = 'عذراً، لم أتمكن من التعرف على صوتك. حاول مرة أخرى.' + `<span class="msg-time">الآن</span>`;
                        messagesArea.appendChild(errorMsg);
                        scrollToBottom();
                    }
                }
                isVoiceCall = false;
            };

            rec.onend = function() {
                stopRecording();
                if (isVoiceCall) {
                    // إذا انتهى التسجيل دون نتيجة، نزيل الدائرة
                    removeVoiceCircle();
                    isVoiceCall = false;
                }
            };

            return rec;
        }

        function startRecording(isVoice = false) {
            if (isRecording) {
                stopRecording();
                return;
            }
            if (!recognition) {
                recognition = initSpeechRecognition();
                if (!recognition) return;
            }
            isVoiceCall = isVoice;
            try {
                recognition.start();
                isRecording = true;
                if (isVoice) {
                    // إظهار دائرة التردد
                    showVoiceCircle();
                    phoneBtn.classList.add('active');
                    phoneBtn.innerHTML = '<i class="fas fa-phone-slash"></i>';
                } else {
                    voiceBtn.classList.add('recording');
                    voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
                }
            } catch (e) {
                console.warn('خطأ في بدء التسجيل:', e);
                if (e.message && e.message.includes('already started')) {
                    stopRecording();
                    setTimeout(() => startRecording(isVoice), 300);
                }
            }
        }

        function stopRecording() {
            if (recognition) {
                try { recognition.stop(); } catch (e) {}
            }
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            phoneBtn.classList.remove('active');
            phoneBtn.innerHTML = '<i class="fas fa-phone"></i>';
            isVoiceCall = false;
        }

        // ===== دوال دائرة التردد الصوتي =====
        let voiceCircleElement = null;

        function showVoiceCircle() {
            // إزالة أي دائرة سابقة
            removeVoiceCircle();
            const wrapper = document.createElement('div');
            wrapper.className = 'message bot';
            wrapper.style.display = 'flex';
            wrapper.style.justifyContent = 'center';
            wrapper.style.alignItems = 'center';
            wrapper.style.flexDirection = 'column';
            wrapper.style.width = '100%';

            const circle = document.createElement('div');
            circle.className = 'voice-circle';
            circle.id = 'voiceCircle';
            circle.innerHTML = `
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="wave"></div>
                <div class="inner-circle">
                    <i class="fas fa-phone-volume"></i>
                </div>
                <div class="status-text">جاري الاستماع...</div>
            `;
            wrapper.appendChild(circle);
            messagesArea.appendChild(wrapper);
            voiceCircleElement = wrapper;
            scrollToBottom();

            // بدء محاكاة تردد الصوت (زيادة حجم الدائرة الداخلية بشكل عشوائي)
            startVolumeAnimation();
        }

        function removeVoiceCircle() {
            if (voiceCircleElement) {
                voiceCircleElement.remove();
                voiceCircleElement = null;
            }
            stopVolumeAnimation();
        }

        let volumeInterval = null;

        function startVolumeAnimation() {
            if (volumeInterval) clearInterval(volumeInterval);
            const inner = document.querySelector('.voice-circle .inner-circle');
            if (!inner) return;
            volumeInterval = setInterval(() => {
                // محاكاة ارتفاع الصوت عشوائياً
                const scale = 0.8 + Math.random() * 0.6;
                inner.style.transform = `scale(${scale})`;
                // تغيير شدة التوهج
                const glow = 20 + Math.random() * 40;
                inner.style.boxShadow = `0 0 ${glow}px rgba(74, 122, 255, 0.6)`;
            }, 150);
        }

        function stopVolumeAnimation() {
            if (volumeInterval) {
                clearInterval(volumeInterval);
                volumeInterval = null;
            }
            const inner = document.querySelector('.voice-circle .inner-circle');
            if (inner) {
                inner.style.transform = 'scale(1)';
                inner.style.boxShadow = '0 0 40px rgba(74, 122, 255, 0.4)';
            }
        }

        // ===== دوال إضافة الرسائل =====
        function addUserMessage(text) {
            const msg = document.createElement('div');
            msg.className = 'message user';
            msg.innerHTML = escapeHtml(text) + `<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(msg);
            scrollToBottom();
        }

        function addBotMessage(text, isVoice = false) {
            const msg = document.createElement('div');
            msg.className = 'message bot';
            // إذا كانت صوتية، نضيف أيقونة هاتف صغيرة
            const icon = isVoice ? '<i class="fas fa-phone" style="margin-left:8px; color:var(--blue-light);"></i> ' : '';
            msg.innerHTML = icon + text + `<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(msg);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        // ===== معالجة الرد الصوتي (من responses2f.json) =====
        async function processVoiceReply(text) {
            if (!text.trim()) return;
            isProcessing = true;
            phoneBtn.disabled = true;
            voiceBtn.disabled = true;
            sendBtn.disabled = true;

            try {
                // عرض مؤشر الكتابة
                typingIndicator.style.display = 'flex';
                scrollToBottom();
                await delay(600 + Math.random() * 1000);
                typingIndicator.style.display = 'none';

                // توليد الرد من ملف responses2f.json
                let reply = '';
                const mathResult = evaluateMath(text);
                if (mathResult !== null) {
                    reply = ` النتيجة هي: **${mathResult}**\nهل تريد حل مسألة أخرى؟`;
                } else {
                    // البحث عن منتج
                    const product = findProduct(text);
                    if (product) {
                        // نعرض بطاقة المنتج كرد صوتي أيضاً
                        const cardHtml = buildProductCard(product);
                        addBotMessage('تم العثور على المنتج التالي:', true);
                        const cardWrapper = document.createElement('div');
                        cardWrapper.className = 'message bot';
                        cardWrapper.innerHTML = cardHtml + `<span class="msg-time">الآن</span>`;
                        messagesArea.appendChild(cardWrapper);
                        scrollToBottom();
                        reply = 'تم عرض بطاقة المنتج';
                    } else {
                        // استخدام الردود الصوتية
                        let category = getCategoryForText(text, true);
                        if (category !== 'default' && responsesVoice[category]) {
                            reply = getReply(category, true);
                        } else {
                            reply = getReply('default', true);
                        }
                    }
                }

                if (reply) {
                    // إذا لم نعرض منتجاً، نعرض الرد النصي
                    if (!findProduct(text)) {
                        addBotMessage(reply, true);
                    }
                }

                // إرسال إلى Discord (اختياري)
                await sendToDiscord(text, reply);

            } catch (error) {
                console.error('خطأ في الرد الصوتي:', error);
                addBotMessage('حدث خطأ، يرجى المحاولة مرة أخرى.', true);
            } finally {
                isProcessing = false;
                phoneBtn.disabled = false;
                voiceBtn.disabled = false;
                sendBtn.disabled = false;
                scrollToBottom();
            }
        }

        // ===== وظيفة إرسال الرسالة النصية العادية =====
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            if (suggestedQuestions) suggestedQuestions.classList.add('hidden');

            isProcessing = true;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;
            phoneBtn.disabled = true;

            try {
                addUserMessage(text);
                conversationHistory.push({ role: 'user', content: text });
                if (conversationHistory.length > 10) conversationHistory.shift();

                messageInput.value = '';
                messageInput.style.height = 'auto';
                charCount.textContent = '0';
                scrollToBottom();

                typingIndicator.style.display = 'flex';
                scrollToBottom();
                await delay(800 + Math.random() * 1200);
                typingIndicator.style.display = 'none';

                const reply = await generateSmartReply(text);

                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                messagesArea.appendChild(botMsg);
                scrollToBottom();

                let replyContent = '';
                if (reply.type === 'product') {
                    botMsg.innerHTML = reply.content + `<span class="msg-time">الآن</span>`;
                    replyContent = 'تم عرض بطاقة منتج';
                    await delay(200);
                } else {
                    await typeText(botMsg, reply.content, 22);
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'msg-time';
                    timeSpan.textContent = 'الآن';
                    botMsg.appendChild(timeSpan);
                    replyContent = reply.content;
                }

                conversationHistory.push({ role: 'bot', content: replyContent || 'تم عرض المنتج' });
                if (conversationHistory.length > 10) conversationHistory.shift();

                await sendToDiscord(text, replyContent);

            } catch (error) {
                console.error('خطأ في sendMessage:', error);
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message bot';
                errorMsg.innerHTML = 'عذراً، حدث خطأ ما. يرجى المحاولة مرة أخرى.' + `<span class="msg-time">الآن</span>`;
                messagesArea.appendChild(errorMsg);
                scrollToBottom();
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                voiceBtn.disabled = false;
                phoneBtn.disabled = false;
                messageInput.focus();
                scrollToBottom();
            }
        }

        // ===== توليد الردود النصية العادية =====
        async function generateSmartReply(text) {
            const lower = text.trim().toLowerCase();

            const mathResult = evaluateMath(text);
            if (mathResult !== null) {
                return { type: 'text', content: ` النتيجة هي: **${mathResult}**\nهل تريد حل مسألة أخرى؟` };
            }

            if (keywordsMap['time'] && keywordsMap['time'].some(p => lower.includes(p))) {
                const now = new Date();
                const timeStr = now.toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh', hour12: true });
                const dateStr = now.toLocaleDateString('ar-SA', { timeZone: 'Asia/Riyadh' });
                const template = getReply('time');
                const reply = template.replace(/\{time\}/g, timeStr).replace(/\{date\}/g, dateStr);
                return { type: 'text', content: reply };
            }

            const product = findProduct(text);
            if (product) {
                const cardHtml = buildProductCard(product);
                return { type: 'product', content: cardHtml };
            }

            let category = getCategoryForText(text);
            if (category !== 'default' && responses[category]) {
                return { type: 'text', content: getReply(category) };
            }

            return { type: 'text', content: getReply('default') };
        }

        // ===== تأثير الكتابة =====
        function typeText(element, text, speed = 20) {
            return new Promise((resolve) => {
                let index = 0;
                element.innerHTML = '';
                const interval = setInterval(() => {
                    if (index < text.length) {
                        element.innerHTML += text.charAt(index);
                        index++;
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, speed);
            });
        }

        // ===== إرسال إلى Discord =====
        async function sendToDiscord(userMessage, botReply) {
            try {
                const payload = {
                    content: `**رسالة جديدة من MEN Ai**\n **المستخدم:** ${userMessage}\n **رد البوت:** ${botReply}\n ${new Date().toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh' })}`
                };
                await fetch('https://discord.com/api/webhooks/1525837076250099733/dFhKcri1KEHTTUXY6zSWd6Duup-NeWCJQ2GtXlx2R2RF9N3RhkrjIWGYt-NPY_kNhHR9', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                console.log('تم إرسال المحادثة إلى Discord');
            } catch (err) {
                console.warn('فشل إرسال الـ webhook:', err);
            }
        }

        // ===== تحميل الملفات =====
        async function loadResponses() {
            try {
                const response = await fetch('responses.json');
                if (!response.ok) throw new Error('تعذر تحميل responses.json');
                const data = await response.json();
                responses = data;
                keywordsMap = buildKeywordsMap(data);
                console.log('تم تحميل responses.json');
                return true;
            } catch (error) {
                console.error('خطأ في تحميل responses.json، استخدام الافتراضي:', error);
                responses = {
                    default: { keywords: ['مرحبا', 'السلام', 'اهلا', 'كيف'], responses: ['مرحباً! كيف يمكنني مساعدتك؟', 'أهلاً بك! أنا MEN Ai، اسألني أي شيء.', 'السلام عليكم! كيف يمكنني خدمتك؟'] },
                    time: { keywords: ['وقت', 'الساعة', 'تاريخ', 'الوقت'], responses: ['الوقت الآن {time} والتاريخ {date}', 'الساعة الآن {time}، والتاريخ {date}', 'حالياً الوقت {time}، اليوم {date}'] },
                    founding: { keywords: ['تأسس', 'تأسيس', 'متى', 'منذ', 'تاريخ', 'انشئ', 'تأسس الفريق', 'الفريق'], responses: ['تأسس فريق MEN في عام 2020، على يد مجموعة من المطورين والمبدعين.', 'تم تأسيس فريق MEN عام 2020، وكانت البداية مع مجموعة من المتحمسين.', 'تعود انطلاقة MEN إلى سنة 2020، حيث اجتمع المؤسسون لبناء رؤية تقنية.'] },
                    pass: { keywords: ['pass', 'اشتراك', 'اشترك', 'كيف اشترك', 'MEN pass'], responses: ['للاشتراك في MEN pass، يمكنك زيارة صفحة المتجر على موقعنا الرسمي.', 'اشترك في MEN pass عبر الضغط على زر "عرض المنتج" في بطاقة MEN PASS.', 'يمكنك الحصول على MEN pass من خلال متجرنا الإلكتروني بسهولة.'] },

        // ===== بناء رسالة الترحيب =====
        function buildWelcomeMessage() {
            return `
                <div class="welcome-animation">
                    <div class="welcome-main">
                        <span class="letter" style="animation-delay: 0s;"></span>
                        <span class="letter" style="animation-delay: 0.12s;"></span>
                        <span class="letter" style="animation-delay: 0.24s;"></span>
                        <span class="letter" style="animation-delay: 0.36s;"></span>
                        <span class="letter" style="animation-delay: 0.48s;"></span>
                        <span class="letter" style="animation-delay: 0.60s;"></span>
                    </div>
                    <div class="typewriter-container">
                        <span class="typewriter-text" id="typewriterText"></span>
                        <span class="typewriter-cursor" id="typewriterCursor"></span>
                    </div>
                    <div class="welcome-desc">
                        <i class="fas fa-circle-notch"></i> أنا هنا لمساعدتك اسألني عن أي شيء!
                    </div>
                </div>
            `;
        }

        function typeTextEffect(element, text, speed = 60) {
            return new Promise((resolve) => {
                let index = 0;
                element.textContent = '';
                const interval = setInterval(() => {
                    if (index < text.length) {
                        element.textContent += text.charAt(index);
                        index++;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, speed);
            });
        }

        // ===== الأحداث =====
        voiceBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (isProcessing) return;
            startRecording(false);
        });

        phoneBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (isProcessing) return;
            // إذا كان الزر نشطاً (أي في وضع التسجيل) نوقف التسجيل
            if (phoneBtn.classList.contains('active')) {
                stopRecording();
                removeVoiceCircle();
                return;
            }
            startRecording(true);
        });

        document.querySelectorAll('.sq-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const question = this.dataset.question;
                if (question) {
                    messageInput.value = question;
                    charCount.textContent = question.length;
                    sendMessage();
                }
            });
        });

        backBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (document.referrer) window.history.back();
            else window.location.href = '/';
        });

        messageInput.addEventListener('input', function() {
            const len = this.value.length;
            charCount.textContent = len > 0 ? len : '0';
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // ===== التهيئة =====
        async function init() {
            messageInput.disabled = true;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;
            phoneBtn.disabled = true;

            await Promise.all([loadResponses(), loadVoiceResponses(), loadProducts()]);

            messagesArea.innerHTML = '';
            const welcomeMsg = document.createElement('div');
            welcomeMsg.className = 'message bot';
            welcomeMsg.innerHTML = buildWelcomeMessage() + `<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(welcomeMsg);
            scrollToBottom();

            const typewriterElement = document.getElementById('typewriterText');
            if (typewriterElement) {
                const fullText = 'مرحبا بك في MEN Ai';
                await typeTextEffect(typewriterElement, fullText, 70);
                const finalHtml = fullText.replace('MEN Ai', '<span class="highlight">MEN Ai</span>');
                typewriterElement.innerHTML = finalHtml;
                const cursor = document.getElementById('typewriterCursor');
                if (cursor) cursor.style.display = 'none';
            }

            messageInput.disabled = false;
            messageInput.focus();
            sendBtn.disabled = false;
            voiceBtn.disabled = false;
            phoneBtn.disabled = false;

            console.log('MEN Ai جاهز مع ميزة المكالمة الصوتية والردود من responses2f.json');
        }

        init();
    </script>
