<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEN Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== جميع الأنماط مع تحسينات الأزرار ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #000000;
            color: #f0f4ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #021ca4, #1a3a9e);
            border-radius: 12px;
        }

        .bg-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(2, 28, 164, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(26, 58, 158, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #000000 0%, #000000 100%);
            animation: ambientFloat 20s ease-in-out infinite alternate;
        }
        @keyframes ambientFloat {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.05) rotate(2deg);
            }
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 18px;
        }
        :root {
            --blue-deep: #021ca4;
            --blue-mid: #1a3a9e;
            --blue-light: #4a7aff;
            --card-bg: rgba(10, 16, 32, 0.85);
            --card-border: rgba(2, 28, 164, 0.25);
            --radius-xl: 24px;
            --radius-2xl: 40px;
            --glow-neon: 0 0 30px rgba(74, 122, 255, 0.15);
        }

        header {
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(2, 28, 164, 0.10);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(2, 28, 164, 0.15);
            border-radius: 40px;
            padding: 0 18px;
            height: 44px;
            color: #a0b0d4;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
        }
        .btn-back i {
            font-size: 1.2rem;
        }
        .btn-back .back-text {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .btn-back:hover {
            background: rgba(74, 122, 255, 0.1);
            border-color: var(--blue-light);
            color: #fff;
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.1);
        }
        .btn-back:active {
            transform: scale(0.95);
        }

        .logo img {
            height: 48px;
            filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(74, 122, 255, 0.3));
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 40%, var(--blue-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(74, 122, 255, 0.2);
        }
        .logo h1 i {
            color: var(--blue-light);
            margin-left: 8px;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 20px rgba(74, 122, 255, 0.3));
            animation: sparkle 2s ease-in-out infinite alternate;
        }
        @keyframes sparkle {
            0% {
                filter: drop-shadow(0 0 10px rgba(74, 122, 255, 0.2));
                transform: scale(1) rotate(0deg);
            }
            100% {
                filter: drop-shadow(0 0 30px rgba(74, 122, 255, 0.6));
                transform: scale(1.1) rotate(10deg);
            }
        }

        .chat-wrapper {
            margin: 30px 0 20px;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--glow-neon);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 500px;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(2, 28, 164, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.4);
        }
        .chat-header .bot-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .chat-header .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #fff;
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.2);
        }
        .chat-header .bot-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }

        .messages-area {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--blue-deep);
            border-radius: 12px;
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: var(--radius-xl);
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            word-wrap: break-word;
            line-height: 1.7;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 20px rgba(2, 28, 164, 0.2);
        }
        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(2, 28, 164, 0.08);
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .message .msg-time {
            font-size: 0.65rem;
            color: #6a708a;
            margin-top: 6px;
            display: block;
            text-align: left;
        }
        .message.user .msg-time {
            text-align: right;
        }

        .typing-indicator {
            align-self: flex-start;
            display: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xl);
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(2, 28, 164, 0.08);
            gap: 10px;
            align-items: center;
            color: #a0b0d4;
            font-size: 0.95rem;
        }
        .typing-indicator .dots {
            display: flex;
            gap: 5px;
        }
        .typing-indicator .dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--blue-light);
            display: inline-block;
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing-indicator .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        .typing-indicator i {
            color: var(--blue-light);
            animation: spin 1s linear infinite;
            font-size: 1.1rem;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .input-area {
            padding: 16px 20px 20px;
            border-top: 1px solid rgba(2, 28, 164, 0.08);
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
        }
        .input-area .input-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-xl);
            border: 1.5px solid rgba(2, 28, 164, 0.1);
            transition: 0.3s;
            padding: 4px 16px 4px 8px;
            min-height: 52px;
        }
        .input-area .input-wrapper:focus-within {
            border-color: var(--blue-light);
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.05);
        }
        .input-area .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4ff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            resize: none;
            padding: 12px 4px;
            min-height: 44px;
            max-height: 150px;
            line-height: 1.6;
        }
        .input-area .input-wrapper textarea::placeholder {
            color: #5a607a;
        }
        .input-area .input-wrapper .char-count {
            font-size: 0.7rem;
            color: #4a5070;
            padding: 8px 4px;
            white-space: nowrap;
            direction: ltr;
        }

        .input-area .btn-send {
            width: 52px;
            height: 52px;
            min-width: 52px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(2, 28, 164, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transform: none;
        }
        .input-area .btn-send::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(74, 122, 255, 0.4), transparent);
            opacity: 0;
            transition: 0.6s;
        }
        .input-area .btn-send:hover::after {
            opacity: 1;
        }
        .input-area .btn-send:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 40px rgba(2, 28, 164, 0.4);
        }
        .input-area .btn-send:active {
            transform: scale(0.92);
        }
        .input-area .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: scale(1);
        }

        footer {
            background: #000000;
            border-top: 1px solid rgba(2, 28, 164, 0.03);
            padding: 50px 0 30px;
            margin-top: 30px;
        }
        .footer-flex {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 40px;
        }
        .footer-col h4 {
            color: var(--blue-light);
            margin-bottom: 18px;
            font-size: 1.2rem;
            text-shadow: 0 0 20px rgba(74, 122, 255, 0.1);
        }
        .footer-col p {
            color: #6a708a;
            margin: 10px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .footer-col p i {
            color: #a0b0d4;
            opacity: 0.7;
            width: 20px;
            transition: 0.3s;
        }
        .footer-col p:hover i {
            color: var(--blue-light);
            transform: scale(1.2);
        }
        .social-icons {
            display: flex;
            gap: 14px;
            margin-top: 12px;
        }
        .social-icons a {
            font-size: 1.4rem;
            color: #6a708a;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-block;
        }
        .social-icons a:hover {
            color: var(--blue-light);
            transform: translateY(-6px) scale(1.2);
            filter: drop-shadow(0 0 20px rgba(74, 122, 255, 0.2));
        }
        .copyright {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(2, 28, 164, 0.03);
            color: #4a5070;
            font-size: 0.9rem;
            width: 100%;
        }
        .copyright span {
            color: var(--blue-light);
        }

        /* ===== أنماط بطاقة المنتج داخل الشات ===== */
        .men-product-card {
            width: 100%;
            max-width: 360px;
            background: #111827;
            border: 1px solid rgba(0, 140, 255, 0.25);
            border-radius: 22px;
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
            box-shadow: 0 0 30px rgba(0, 119, 255, 0.15);
            animation: show 0.4s ease;
            margin: 4px 0;
        }
        .men-product-card .product-image {
            width: 100%;
            height: 210px;
            object-fit: cover;
            display: block;
        }
        .men-product-card .product-content {
            padding: 20px;
        }
        .men-product-card .badge {
            display: inline-block;
            background: rgba(0, 132, 255, 0.18);
            color: #55b8ff;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .men-product-card .product-content h2 {
            margin: 0;
            font-size: 26px;
        }
        .men-product-card .product-content p {
            color: #b9c5d8;
            line-height: 1.7;
            margin: 15px 0 20px;
        }
        .men-product-card .bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .men-product-card .price {
            font-size: 30px;
            color: #3aa8ff;
            font-weight: bold;
        }
        .men-product-card .price small {
            font-size: 15px;
            color: #8fb7ff;
        }
        .men-product-card button {
            background: linear-gradient(90deg, #0077ff, #00b7ff);
            color: white;
            border: none;
            padding: 12px 26px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.25s;
        }
        .men-product-card button:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 0 20px rgba(0, 140, 255, 0.5);
        }
        @keyframes show {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== استجابة ===== */
        @media (max-width: 768px) {
            .chat-wrapper {
                height: calc(100vh - 160px);
                min-height: 400px;
                border-radius: var(--radius-xl);
            }
            .message {
                max-width: 90%;
                padding: 12px 16px;
                font-size: 0.95rem;
            }
            .input-area {
                padding: 12px 14px 16px;
                gap: 8px;
            }
            .input-area .input-wrapper {
                padding: 2px 12px 2px 6px;
                min-height: 44px;
            }
            .input-area .input-wrapper textarea {
                padding: 8px 2px;
                font-size: 0.95rem;
                min-height: 36px;
            }
            .input-area .btn-send {
                width: 44px;
                height: 44px;
                min-width: 44px;
                font-size: 1.2rem;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .chat-header .bot-avatar {
                width: 36px;
                height: 36px;
                font-size: 1.2rem;
            }
            .messages-area {
                padding: 14px 16px;
                gap: 10px;
            }
            .logo h1 {
                font-size: 1.4rem;
            }
            .logo h1 i {
                font-size: 1rem;
            }
            .logo img {
                height: 36px;
            }
            .btn-back {
                height: 38px;
                padding: 0 14px;
                font-size: 0.9rem;
            }
            .btn-back i {
                font-size: 1rem;
            }
            .btn-back .back-text {
                font-size: 0.85rem;
            }
            .men-product-card {
                max-width: 100%;
            }
            .men-product-card .product-image {
                height: 160px;
            }
        }
        @media (max-width: 480px) {
            .message {
                max-width: 95%;
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .input-area .input-wrapper textarea {
                font-size: 0.85rem;
                min-height: 32px;
            }
            .input-area .btn-send {
                width: 38px;
                height: 38px;
                min-width: 38px;
                font-size: 1rem;
            }
            .chat-wrapper {
                height: calc(100vh - 140px);
                min-height: 350px;
                border-radius: 18px;
            }
            .messages-area {
                padding: 10px 12px;
                gap: 8px;
            }
            .container {
                width: 96%;
                padding: 0 10px;
            }
            .logo h1 {
                font-size: 1.1rem;
            }
            .logo h1 i {
                font-size: 0.9rem;
            }
            .logo img {
                height: 30px;
            }
            .btn-back {
                height: 34px;
                padding: 0 10px;
                font-size: 0.8rem;
            }
            .btn-back i {
                font-size: 0.9rem;
            }
            .btn-back .back-text {
                font-size: 0.75rem;
            }
            .men-product-card .product-image {
                height: 140px;
            }
            .men-product-card .product-content {
                padding: 16px;
            }
            .men-product-card .product-content h2 {
                font-size: 22px;
            }
            .men-product-card .price {
                font-size: 24px;
            }
            .men-product-card button {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
        @media (max-width: 360px) {
            .logo h1 {
                font-size: 0.9rem;
            }
            .logo h1 i {
                font-size: 0.8rem;
            }
            .logo img {
                height: 26px;
            }
            .btn-back {
                height: 30px;
                padding: 0 8px;
                font-size: 0.7rem;
            }
            .btn-back i {
                font-size: 0.8rem;
            }
            .btn-back .back-text {
                font-size: 0.7rem;
            }
            .chat-header .bot-name {
                font-size: 0.9rem;
            }
            .chat-header .bot-avatar {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-ambient"></div>

    <header>
        <div class="container header-content">
            <div class="logo">
                <a href="#" class="btn-back" id="backBtn" title="رجوع">
                    <i class="fas fa-arrow-right"></i>
                    <span class="back-text">رجوع</span>
                </a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="chat-wrapper">
                <div class="chat-header">
                    <div class="bot-info">
                        <div class="bot-avatar"><i class="fas fa-wand-sparkles"></i></div>
                        <div>
                            <div class="bot-name">MEN Ai</div>
                        </div>
                    </div>
                </div>

                <div class="messages-area" id="messagesArea">
                    <div class="message bot">
                        <i class="fas fa-wand-sparkles" style="color:var(--blue-light);margin-left:8px;"></i>
                        مرحباً بك في MEN Ai! أنا نموذج ذكي، اسألني عن أي شيء وسأحاول مساعدتك.
                        <span class="msg-time">الآن</span>
                    </div>
                </div>

                <div class="typing-indicator" id="typingIndicator">
                    <i class="fas fa-circle-notch"></i>
                    <span>جار التفكير</span>
                    <span class="dots"><span></span><span></span><span></span></span>
                </div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="messageInput" rows="1" placeholder="اسألني عن أي شيء..."></textarea>
                        <span class="char-count" id="charCount">0</span>
                    </div>
                    <button class="btn-send" id="sendBtn" title="إرسال">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-flex">
                <div class="footer-col">
                    <h4><i class="fas fa-compass" style="margin-left:8px; color:var(--blue-deep);"></i>تواصل معنا</h4>
                    <p><i class="fas fa-envelope"></i> clan.men.ts@gmail.com</p>
                    <p><i class="fas fa-phone"></i> 0540367546</p>
                    <div class="social-icons">
                        <a href="https://x.com/men_vi5" target="_blank"><i class="fab fa-x-twitter"></i></a>
                        <a href="https://youtube.com/@clan_men" target="_blank"><i class="fab fa-youtube"></i></a>
                        <a href="https://discord.gg/UJTZfvGew" target="_blank"><i class="fab fa-discord"></i></a>
                        <a href="https://www.tiktok.com/@team_men2020" target="_blank"><i class="fab fa-tiktok"></i></a>
                    </div>
                </div>
                <div class="copyright">جميع الحقوق محفوظة © 2020 MEN <span></span></div>
            </div>
        </div>
    </footer>

    <script>
        // ============================================================
        //  🧠  محرك الردود (تحميل من JSON مع الكلمات المفتاحية)
        // ============================================================

        let responses = {};
        let keywordsMap = {};
        let products = [];

        // ============================================================
        //  📐  مسافة ليفنشتاين (Levenshtein Distance)
        // ============================================================
        function levenshteinDistance(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }
            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b[i - 1] === a[j - 1]) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function getReply(category) {
            const list = responses[category]?.responses;
            if (!list || list.length === 0) {
                return getReply('default');
            }
            return list[Math.floor(Math.random() * list.length)];
        }

        function buildKeywordsMap(data) {
            const map = {};
            for (const [cat, obj] of Object.entries(data)) {
                if (obj.keywords && Array.isArray(obj.keywords)) {
                    map[cat] = obj.keywords.map(k => k.toLowerCase());
                }
            }
            return map;
        }

        // ============================================================
        //  🔍  البحث عن أقرب فئة (بدلاً من المطابقة التامة)
        // ============================================================
        function getCategoryForText(text) {
            const words = text.trim().toLowerCase().split(/\s+/).filter(w => w.length >= 3);
            if (words.length === 0) return 'default';

            let bestCategory = 'default';
            let bestScore = Infinity;

            for (const [cat, patterns] of Object.entries(keywordsMap)) {
                for (const pattern of patterns) {
                    for (const word of words) {
                        const dist = levenshteinDistance(word, pattern);
                        if (dist < bestScore) {
                            bestScore = dist;
                            bestCategory = cat;
                        }
                    }
                }
            }

            if (bestScore > 2) {
                return responses['general'] ? 'general' : 'default';
            }

            return bestCategory;
        }

        function evaluateMath(text) {
            const mathRegex = /(\d+)\s*([+\-*/])\s*(\d+)/;
            const match = text.match(mathRegex);
            if (match) {
                const a = parseFloat(match[1]);
                const op = match[2];
                const b = parseFloat(match[3]);
                if (isNaN(a) || isNaN(b)) return null;
                let result;
                switch (op) {
                    case '+':
                        result = a + b;
                        break;
                    case '-':
                        result = a - b;
                        break;
                    case '*':
                        result = a * b;
                        break;
                    case '/':
                        if (b === 0) return 'لا يمكن القسمة على صفر';
                        result = a / b;
                        break;
                    default:
                        return null;
                }
                return Number.isInteger(result) ? result : result.toFixed(2);
            }
            return null;
        }

        // ============================================================
        //  🛒  البحث عن منتج في قائمة المنتجات
        // ============================================================
        function findProduct(text) {
            const lower = text.trim().toLowerCase();
            // نبحث عن كلمات مفتاحية تدل على طلب منتج
            const productTriggers = ['عرض', 'اشتري', 'شراء', 'منتج', 'pass', 'اشتراك', 'تفاصيل', 'سعر'];
            const words = lower.split(/\s+/);
            let hasTrigger = false;
            for (const w of words) {
                if (productTriggers.some(t => w.includes(t) || t.includes(w))) {
                    hasTrigger = true;
                    break;
                }
            }
            if (!hasTrigger) return null;

            // نبحث في قائمة المنتجات عن تطابق في الاسم أو الوصف
            for (const product of products) {
                const name = product.name.toLowerCase();
                const desc = (product.description || '').toLowerCase();
                // نتحقق من وجود أي كلمة من النص في اسم المنتج أو وصفه
                for (const word of words) {
                    if (word.length >= 2) {
                        if (name.includes(word) || desc.includes(word)) {
                            return product;
                        }
                    }
                }
                // أيضاً نبحث عن تطابق جزئي في الاسم بالكامل
                if (name.includes(lower) || lower.includes(name)) {
                    return product;
                }
            }
            return null;
        }

        // ============================================================
        //  🧩  إنشاء بطاقة المنتج كـ HTML
        // ============================================================
        function buildProductCard(product) {
            const image = product.image || 'images/default.png';
            const name = product.name || 'منتج';
            const description = product.description || 'لا يوجد وصف';
            const price = product.price || '0';
            const currency = product.currency || 'ر.س';
            const badge = product.badge || '✨ منتج';
            const link = product.link || '#';

            return `
                <div class="men-product-card">
                    <img src="${image}" class="product-image" alt="${name}" onerror="this.src='images/default.png'">
                    <div class="product-content">
                        <span class="badge">${badge}</span>
                        <h2>${name}</h2>
                        <p>${description}</p>
                        <div class="bottom">
                            <div class="price">
                                ${price} <small>${currency}</small>
                            </div>
                            <button onclick="window.location.href='${link}'">عرض المنتج</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        //  🤖  توليد الرد الذكي (يدعم المنتجات)
        // ============================================================
        function generateSmartReply(text) {
            const lower = text.trim().toLowerCase();

            // 1. التحقق من الرياضيات
            const mathResult = evaluateMath(text);
            if (mathResult !== null) {
                return { type: 'text', content: `🧮 النتيجة هي: **${mathResult}**\nهل تريد حل مسألة أخرى؟` };
            }

            // 2. التحقق من الوقت
            if (keywordsMap['time'] && keywordsMap['time'].some(p => lower.includes(p))) {
                const now = new Date();
                const timeStr = now.toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh', hour12: true });
                const dateStr = now.toLocaleDateString('ar-SA', { timeZone: 'Asia/Riyadh' });
                const template = getReply('time');
                const reply = template.replace(/\{time\}/g, timeStr).replace(/\{date\}/g, dateStr);
                return { type: 'text', content: reply };
            }

            // 3. البحث عن منتج
            const product = findProduct(text);
            if (product) {
                const cardHtml = buildProductCard(product);
                return { type: 'product', content: cardHtml };
            }

            // 4. الردود النصية العادية (باستخدام الفئات)
            let category = getCategoryForText(text);

            // تحسين: إذا كان هناك تاريخ محادثة، يمكن إضافة ردود متابعة
            if (conversationHistory.length >= 2) {
                const lastUserMsg = conversationHistory.filter(m => m.role === 'user').pop();
                if (lastUserMsg && lastUserMsg.content !== text && text.split(' ').length <= 3) {
                    if (category === 'default' || category === 'general') {
                        return { type: 'text', content: `🤔 هل تقصد: "${lastUserMsg.content}"؟\nأخبرني بالمزيد لأتمكن من مساعدتك بشكل أفضل.` };
                    }
                }
            }

            if (category !== 'default' && responses[category]) {
                return { type: 'text', content: getReply(category) };
            }

            return { type: 'text', content: getReply('default') };
        }

        // ============================================================
        //  🧩  منطق التشغيل
        // ============================================================

        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const charCount = document.getElementById('charCount');
        const typingIndicator = document.getElementById('typingIndicator');
        const backBtn = document.getElementById('backBtn');

        let isProcessing = false;
        let conversationHistory = [];

        backBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (document.referrer) window.history.back();
            else window.location.href = '/';
        });

        messageInput.addEventListener('input', function() {
            const len = this.value.length;
            charCount.textContent = len > 0 ? len : '0';
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // دالة لكتابة النص بشكل تدريجي (تستخدم للنصوص فقط)
        function typeText(element, text, speed = 20) {
            return new Promise((resolve) => {
                let index = 0;
                element.innerHTML = '';
                const interval = setInterval(() => {
                    if (index < text.length) {
                        element.innerHTML += text.charAt(index);
                        index++;
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, speed);
            });
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            if (isProcessing) return;

            isProcessing = true;
            sendBtn.disabled = true;

            // عرض رسالة المستخدم
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = escapeHtml(text) + `<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(userMsg);
            conversationHistory.push({ role: 'user', content: text });
            if (conversationHistory.length > 10) conversationHistory.shift();

            messageInput.value = '';
            messageInput.style.height = 'auto';
            charCount.textContent = '0';
            scrollToBottom();

            // إظهار مؤشر الكتابة
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            await delay(800 + Math.random() * 1200);

            typingIndicator.style.display = 'none';

            // توليد الرد
            const reply = generateSmartReply(text);

            // إنشاء رسالة البوت
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            messagesArea.appendChild(botMsg);
            scrollToBottom();

            if (reply.type === 'product') {
                // عرض بطاقة المنتج مباشرة (بدون تأثير كتابة)
                botMsg.innerHTML = reply.content + `<span class="msg-time">الآن</span>`;
                // نضيف تأخير بسيط لتحسين التجربة
                await delay(200);
            } else {
                // عرض النص مع تأثير الكتابة
                await typeText(botMsg, reply.content, 22);
                const timeSpan = document.createElement('span');
                timeSpan.className = 'msg-time';
                timeSpan.textContent = 'الآن';
                botMsg.appendChild(timeSpan);
            }

            conversationHistory.push({ role: 'bot', content: reply.content || 'تم عرض المنتج' });
            if (conversationHistory.length > 10) conversationHistory.shift();

            isProcessing = false;
            sendBtn.disabled = false;
            messageInput.focus();
            scrollToBottom();
        }

        sendBtn.addEventListener('click', sendMessage);

        // ============================================================
        //  📥  تحميل الردود والمنتجات
        // ============================================================

        async function loadResponses() {
            try {
                const response = await fetch('responses.json');
                if (!response.ok) throw new Error('تعذر تحميل ملف الردود');
                const data = await response.json();
                responses = data;
                keywordsMap = buildKeywordsMap(data);
                console.log('✅ تم تحميل الردود والكلمات المفتاحية بنجاح');
                return true;
            } catch (error) {
                console.error('❌ خطأ في تحميل الردود:', error);
                responses = {
                    default: { responses: ['عذراً، حدث خطأ في تحميل الردود. تأكد من وجود ملف responses.json.'] }
                };
                keywordsMap = {};
                return false;
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                if (!response.ok) throw new Error('تعذر تحميل ملف المنتجات');
                const data = await response.json();
                products = data;
                console.log('✅ تم تحميل المنتجات بنجاح، عددها:', products.length);
                return true;
            } catch (error) {
                console.error('❌ خطأ في تحميل المنتجات:', error);
                products = [];
                return false;
            }
        }

        async function init() {
            // تعطيل المدخلات حتى تحميل البيانات
            messageInput.disabled = true;
            sendBtn.disabled = true;

            await Promise.all([loadResponses(), loadProducts()]);

            // تفعيل المدخلات
            messageInput.disabled = false;
            messageInput.focus();
            sendBtn.disabled = false;

            // إذا لم توجد منتجات، نعرض رسالة في الشات
            if (products.length === 0) {
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                botMsg.innerHTML = '⚠️ لم يتم تحميل أي منتج. تأكد من وجود ملف products.json مع البيانات.';
                messagesArea.appendChild(botMsg);
                scrollToBottom();
            }
        }

        init();

        console.log('🚀 MEN Ai جاهز للعمل مع البحث عن المنتجات!');
    </script>
</body>
</html>
