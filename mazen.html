<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القفز في الظلام</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            direction: rtl;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: #111;
            border: 3px solid #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #loginScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
            padding: 20px;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin: 10px 0;
            width: 80%;
            max-width: 300px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input:focus {
            border-color: #666;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .input-group input::placeholder {
            color: #555;
        }

        .btn {
            padding: 12px 40px;
            background: #222;
            border: 2px solid #444;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 5px;
            min-width: 150px;
            font-weight: bold;
        }

        .btn:hover {
            background: #333;
            border-color: #666;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .btn-primary {
            background: #2a2a2a;
            border-color: #555;
        }

        .btn-primary:hover {
            background: #3a3a3a;
            border-color: #777;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.2rem;
            z-index: 5;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            display: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats span {
            color: #fff;
            font-weight: bold;
        }

        #scoreDisplay {
            color: #ffd700;
        }

        .game-over-title {
            color: #ff4444;
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }

        .final-score {
            font-size: 1.5rem;
            color: #fff;
            margin: 15px 0;
        }

        .final-score span {
            color: #ffd700;
            font-weight: bold;
        }

        .player-name-display {
            color: #888;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .bonus-text {
            color: #4caf50;
            font-size: 1.2rem;
            margin: 5px 0;
        }

        .hidden {
            display: none !important;
        }

        .controls-hint {
            color: #555;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen">
        <h1>🌑 القفز في الظلام</h1>
        <p class="subtitle">اقفز في الظلام واجمع النقاط</p>
        <div class="input-group">
            <input type="text" id="playerName" placeholder="الاسم" maxlength="20" value="أحمد">
        </div>
        <div class="input-group">
            <input type="text" id="playerPhone" placeholder="رقم الجوال" maxlength="15" value="0501234567">
        </div>
        <button class="btn btn-primary" onclick="startGame()">بدء اللعبة</button>
        <p class="controls-hint">␣ مسافة | ↑ للأعلى | W | أو اضغط على الشاشة للقفز</p>
    </div>

    <!-- شاشة انتهاء اللعبة -->
    <div id="gameOverScreen">
        <h1 class="game-over-title">💀 انتهت اللعبة</h1>
        <div class="final-score">النقاط: <span id="finalScore">0</span></div>
        <div class="player-name-display" id="finalPlayerInfo"></div>
        <div id="bonusMessage" class="bonus-text"></div>
        <div>
            <button class="btn" onclick="restartGame()">🔄 العب مرة أخرى</button>
            <button class="btn" onclick="showLogin()">🏠 القائمة الرئيسية</button>
        </div>
    </div>

    <!-- عرض النقاط والإحصائيات -->
    <div class="stats" id="statsBar">
        <span>👤 <span id="displayName">---</span></span>
        <span style="margin-left: 20px;">⭐ <span id="displayScore">0</span></span>
        <span style="margin-left: 20px;">🏆 <span id="displayHighScore">0</span></span>
    </div>
</div>

<script>
    // ==================== إعدادات اللعبة ====================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1529157218094547035/4KRu-0ND_mNGJx9ZYR9D50rhyqkdr2N5Upl_E0ufyhRGEPznDFb9T11I5Lq3KsA8Poa9';

    // ==================== متغيرات اللعبة ====================
    let player = {
        x: 100,
        y: 350,
        width: 30,
        height: 40,
        vy: 0,
        jumpPower: -10,
        gravity: 0.5,
        grounded: false
    };

    let obstacles = [];
    let coins = [];
    let score = 0;
    let highScore = 0;
    let gameRunning = false;
    let gameLoopId = null;
    let spawnTimer = 0;
    let coinSpawnTimer = 0;
    let speed = 4;
    let playerName = '';
    let playerPhone = '';
    let frameCount = 0;

    // ==================== إدارة الحسابات ====================
    function getPlayerData(name) {
        try {
            const data = localStorage.getItem('dark_jump_' + name);
            if (data) {
                return JSON.parse(data);
            }
        } catch(e) {}
        return null;
    }

    function savePlayerData(name, phone, score) {
        const data = {
            name: name,
            phone: phone,
            highScore: Math.max(score, getPlayerData(name)?.highScore || 0),
            lastScore: score,
            lastPlay: new Date().toISOString()
        };
        localStorage.setItem('dark_jump_' + name, JSON.stringify(data));
        return data;
    }

    function updateHighScore() {
        const data = getPlayerData(playerName);
        if (data) {
            highScore = data.highScore || 0;
        }
        document.getElementById('displayHighScore').textContent = highScore;
    }

    // ==================== دوال اللعبة ====================
    function startGame() {
        const name = document.getElementById('playerName').value.trim();
        const phone = document.getElementById('playerPhone').value.trim();

        if (!name || !phone) {
            alert('الرجاء إدخال الاسم ورقم الجوال');
            return;
        }

        playerName = name;
        playerPhone = phone;

        const data = getPlayerData(name);
        highScore = data?.highScore || 0;

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('statsBar').style.display = 'block';
        document.getElementById('gameOverScreen').style.display = 'none';

        document.getElementById('displayName').textContent = name;
        document.getElementById('displayScore').textContent = '0';
        document.getElementById('displayHighScore').textContent = highScore;

        resetGame();
        gameRunning = true;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function resetGame() {
        player.y = 350;
        player.vy = 0;
        player.grounded = true;
        obstacles = [];
        coins = [];
        score = 0;
        speed = 4;
        spawnTimer = 0;
        coinSpawnTimer = 0;
        frameCount = 0;
        document.getElementById('displayScore').textContent = '0';
    }

    function gameLoop() {
        if (!gameRunning) return;

        frameCount++;
        update();
        draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function update() {
        // الجاذبية
        player.vy += player.gravity;
        player.y += player.vy;

        // الأرض
        if (player.y >= 350) {
            player.y = 350;
            player.vy = 0;
            player.grounded = true;
        }

        // القفز - التحقق من المفتاح المضغوط
        if (player.grounded && (keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'])) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }

        // زيادة السرعة
        if (frameCount % 200 === 0 && speed < 10) {
            speed += 0.3;
        }

        // spawn العوائق
        spawnTimer++;
        let spawnRate = Math.max(60, 120 - speed * 6);
        if (spawnTimer > spawnRate) {
            spawnObstacle();
            spawnTimer = 0;
        }

        // spawn العملات
        coinSpawnTimer++;
        let coinRate = Math.max(30, 60 - speed * 3);
        if (coinSpawnTimer > coinRate) {
            spawnCoin();
            coinSpawnTimer = 0;
        }

        // تحديث العوائق
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= speed;
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                continue;
            }
            if (checkCollision(player, obstacles[i])) {
                endGame();
                return;
            }
        }

        // تحديث العملات
        for (let i = coins.length - 1; i >= 0; i--) {
            coins[i].x -= speed;
            if (coins[i].x + coins[i].width < 0) {
                coins.splice(i, 1);
                continue;
            }
            if (checkCollision(player, coins[i])) {
                score += 10;
                document.getElementById('displayScore').textContent = score;
                coins.splice(i, 1);
            }
        }
    }

    function spawnObstacle() {
        const height = 25 + Math.random() * 35;
        obstacles.push({
            x: 800,
            y: 370 - height,
            width: 15 + Math.random() * 20,
            height: height
        });
    }

    function spawnCoin() {
        coins.push({
            x: 800,
            y: 200 + Math.random() * 150,
            width: 15,
            height: 15
        });
    }

    function checkCollision(a, b) {
        return a.x < b.x + b.width &&
            a.x + a.width > b.x &&
            a.y < b.y + b.height &&
            a.y + a.height > b.y;
    }

    function draw() {
        // خلفية مظلمة
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, 800, 500);

        // أرضية
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 390, 800, 110);

        // خط أرضي خافت
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 390);
        ctx.lineTo(800, 390);
        ctx.stroke();

        // رسم العوائق
        for (let obs of obstacles) {
            ctx.fillStyle = '#1a1a1a';
            ctx.shadowColor = 'rgba(255,255,255,0.03)';
            ctx.shadowBlur = 10;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
        }
        ctx.shadowBlur = 0;

        // رسم العملات
        for (let coin of coins) {
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = 'rgba(255,215,0,0.3)';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(coin.x + coin.width/2, coin.y + coin.height/2, coin.width/2, 0, Math.PI * 2);
            ctx.fill();
            // بريق
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(coin.x + coin.width/3, coin.y + coin.height/3, 3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        // رسم اللاعب (شخصية مظلمة)
        ctx.shadowColor = 'rgba(255,255,255,0.05)';
        ctx.shadowBlur = 20;
        
        // جسم
        const grad = ctx.createRadialGradient(
            player.x + player.width/2, player.y + player.height/2, 5,
            player.x + player.width/2, player.y + player.height/2, 25
        );
        grad.addColorStop(0, '#2a2a2a');
        grad.addColorStop(1, '#0a0a0a');
        ctx.fillStyle = grad;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        // عيون خافتة (تتوهج قليلاً)
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(player.x + 5, player.y + 10, 6, 6);
        ctx.fillRect(player.x + player.width - 11, player.y + 10, 6, 6);
        
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1;
        ctx.strokeRect(player.x, player.y, player.width, player.height);
        ctx.shadowBlur = 0;

        // توهج خفيف جداً
        ctx.fillStyle = `rgba(255,255,255,${0.005 + Math.sin(Date.now() / 2000) * 0.005})`;
        ctx.fillRect(0, 0, 800, 500);

        // عرض السرعة
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.font = '12px Arial';
        ctx.fillText(`السرعة: ${Math.round(speed * 10) / 10}`, 700, 30);
    }

    // ==================== التحكم باللوحة ====================
    const keys = {};
    document.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            e.preventDefault();
        }
    });
    document.addEventListener('keyup', (e) => {
        keys[e.key] = false;
    });

    // النقر على الشاشة للقفز
    canvas.addEventListener('click', () => {
        if (gameRunning && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }
    });

    // ==================== إنهاء اللعبة ====================
    function endGame() {
        gameRunning = false;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);

        let newHighScore = highScore;
        if (score > highScore) {
            newHighScore = score;
            highScore = score;
        }
        savePlayerData(playerName, playerPhone, score);

        sendToDiscord(playerName, playerPhone, score, newHighScore);

        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalPlayerInfo').textContent = `👤 ${playerName} | 📱 ${playerPhone}`;
        
        const bonusMsg = document.getElementById('bonusMessage');
        if (score >= 100) {
            bonusMsg.textContent = '🎉 مكافأة: 50 نقطة إضافية!';
            bonusMsg.style.color = '#4caf50';
        } else if (score >= 50) {
            bonusMsg.textContent = '✨ مكافأة: 20 نقطة إضافية!';
            bonusMsg.style.color = '#ff9800';
        } else {
            bonusMsg.textContent = '💪 حاول مرة أخرى للحصول على مكافآت!';
            bonusMsg.style.color = '#888';
        }

        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        resetGame();
        gameRunning = true;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function showLogin() {
        gameRunning = false;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        resetGame();
    }

    // ==================== إرسال إلى Discord ====================
    function sendToDiscord(name, phone, score, highScore) {
        try {
            const message = {
                content: null,
                embeds: [{
                    title: '🎮 نتيجة لعبة القفز في الظلام',
                    color: 0x2b2d42,
                    fields: [
                        { name: '👤 الاسم', value: name, inline: true },
                        { name: '📱 رقم الجوال', value: phone, inline: true },
                        { name: '⭐ النقاط', value: `${score}`, inline: true },
                        { name: '🏆 أعلى نتيجة', value: `${highScore}`, inline: true },
                        { name: '📅 التاريخ', value: new Date().toLocaleString('ar-SA'), inline: false }
                    ],
                    footer: { text: 'Dark Jump Game' },
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            }).catch(err => console.log('خطأ في الإرسال:', err));
        } catch(e) {}
    }

    // ==================== بدء التشغيل ====================
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('statsBar').style.display = 'none';

    // رسم الخلفية
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, 800, 500);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 390, 800, 110);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.font = '20px Arial';
    ctx.fillText('ادخل اسمك وابدأ القفز', 280, 250);
</script>

</body>
</html>
