<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Leap - القفز في الظلام</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 960px;
            height: 600px;
            background: #0a0a12;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 
                0 0 120px rgba(80, 40, 160, 0.15),
                0 0 240px rgba(40, 20, 100, 0.08),
                inset 0 0 80px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ===== شاشات ===== */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 30px;
            transition: all 0.6s ease;
        }

        #loginScreen {
            background: rgba(5, 5, 12, 0.88);
            backdrop-filter: blur(30px);
        }

        #gameOverScreen {
            background: rgba(5, 5, 12, 0.92);
            backdrop-filter: blur(30px);
            display: none;
        }

        /* ===== القمر في صفحة الدخول (بارز وجميل) ===== */
        .moon-container {
            position: absolute;
            top: -60px;
            right: -60px;
            width: 400px;
            height: 400px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.25;
        }

        .moon {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #faf4e8, #d4c8b0 55%, #9a8a7a 85%, #5a4e42);
            box-shadow: 
                0 0 120px rgba(210, 190, 170, 0.2),
                0 0 240px rgba(180, 160, 140, 0.08),
                inset -30px -30px 80px rgba(0, 0, 0, 0.5);
            position: relative;
            transform: rotate(-5deg);
        }

        .moon::before {
            content: '';
            position: absolute;
            top: 50px;
            left: 70px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                90px 60px 0 20px rgba(0, 0, 0, 0.06),
                160px 130px 0 30px rgba(0, 0, 0, 0.05),
                40px 170px 0 25px rgba(0, 0, 0, 0.07),
                200px 50px 0 15px rgba(0, 0, 0, 0.04);
        }

        .moon::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        .moon-glow {
            position: absolute;
            top: -80px;
            right: -80px;
            width: 560px;
            height: 560px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(220, 200, 180, 0.10) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ===== نجوم الخلفية ===== */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite alternate;
            opacity: 0.2;
        }

        @keyframes twinkle {
            0% { opacity: 0.05; transform: scale(0.6); }
            100% { opacity: 0.7; transform: scale(1.4); }
        }

        /* ===== عناصر الدخول ===== */
        .login-content {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 0 20px;
        }

        .title-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 2px;
        }

        .game-title {
            font-size: 4.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 15%, #a89bff 50%, #6a5acd 85%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 100px rgba(130, 100, 255, 0.12);
            letter-spacing: 4px;
            position: relative;
        }

        /* القمر المصغر بجوار العنوان */
        .mini-moon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #faf4e8, #d4c8b0 55%, #9a8a7a 85%, #5a4e42);
            box-shadow: 
                0 0 40px rgba(210, 190, 170, 0.25),
                0 0 80px rgba(180, 160, 140, 0.10),
                inset -8px -8px 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
            position: relative;
            transform: rotate(-5deg);
        }

        .mini-moon::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 15px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.08);
            box-shadow: 
                18px 12px 0 4px rgba(0, 0, 0, 0.06),
                30px 22px 0 6px rgba(0, 0, 0, 0.05),
                8px 30px 0 5px rgba(0, 0, 0, 0.07);
        }

        .mini-moon::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .game-subtitle {
            color: rgba(255, 255, 255, 0.12);
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: 8px;
            font-weight: 400;
        }

        .input-group {
            margin: 6px 0;
            width: 85%;
            max-width: 360px;
            position: relative;
            z-index: 3;
        }

        .input-group input {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: #d0d0e0;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.4s ease;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .input-group input:focus {
            border-color: rgba(150, 120, 255, 0.25);
            box-shadow: 0 0 50px rgba(100, 80, 200, 0.06);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.10);
        }

        .input-group label {
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.7rem;
            display: block;
            margin-bottom: 4px;
            letter-spacing: 3px;
        }

        .btn {
            padding: 16px 52px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #d0d0e0;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.4s ease;
            margin: 10px 5px;
            min-width: 180px;
            font-weight: 700;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 3;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.18);
            transform: scale(1.02);
            box-shadow: 0 0 70px rgba(100, 80, 200, 0.06);
        }

        .btn-primary {
            background: rgba(120, 100, 255, 0.10);
            border-color: rgba(120, 100, 255, 0.20);
        }

        .btn-primary:hover {
            background: rgba(120, 100, 255, 0.18);
            border-color: rgba(120, 100, 255, 0.30);
            box-shadow: 0 0 90px rgba(120, 100, 255, 0.08);
        }

        .controls-hint {
            color: rgba(255, 255, 255, 0.04);
            font-size: 0.75rem;
            margin-top: 20px;
            letter-spacing: 2px;
            z-index: 3;
        }

        .controls-hint kbd {
            background: rgba(255, 255, 255, 0.03);
            padding: 3px 14px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-family: 'Cairo', sans-serif;
            color: rgba(255, 255, 255, 0.10);
        }

        /* ===== شريط الإحصائيات ===== */
        #statsBar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            padding: 10px 22px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-item {
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item span {
            color: #fff;
            font-weight: 700;
        }

        .stat-item .highlight {
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        .stat-item .level-badge {
            background: rgba(120, 100, 255, 0.08);
            padding: 3px 16px;
            border-radius: 20px;
            border: 1px solid rgba(120, 100, 255, 0.08);
            color: #a99bff;
            font-size: 0.75rem;
        }

        /* ===== شاشة النهاية ===== */
        .game-over-title {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4466, #ff6644);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .final-score-box {
            background: rgba(255, 255, 255, 0.02);
            padding: 18px 50px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin: 12px 0;
            text-align: center;
        }

        .final-score-box .score-number {
            font-size: 3.8rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 60px rgba(255, 215, 0, 0.06);
        }

        .final-score-box .score-label {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .level-reached {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.95rem;
            margin: 3px 0 12px;
        }

        .level-reached span {
            color: #a99bff;
        }

        .bonus-text {
            color: #ffd700;
            font-size: 1rem;
            margin: 3px 0 15px;
            padding: 6px 24px;
            background: rgba(255, 215, 0, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.06);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <!-- نجوم الخلفية -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- القمر الخلفي الكبير -->
    <div class="moon-container" id="moonContainer">
        <div class="moon-glow"></div>
        <div class="moon"></div>
    </div>

    <canvas id="gameCanvas" width="960" height="600"></canvas>

    <!-- ===== شاشة الدخول ===== -->
    <div class="screen" id="loginScreen">
        <div class="login-content">
            <!-- عنوان مع قمر مصغر -->
            <div class="title-wrapper">
                <div class="game-title">DARK LEAP</div>
                <div class="mini-moon"></div>
            </div>
            <div class="game-subtitle">✦ القفز في الظلام ✦</div>

            <div class="input-group">
                <label>الاسم</label>
                <input type="text" id="playerName" placeholder="اكتب اسمك" maxlength="20" value="">
            </div>
            <div class="input-group">
                <label>رقم الجوال</label>
                <input type="text" id="playerPhone" placeholder="05xxxxxxxx" maxlength="15" value="">
            </div>

            <button class="btn btn-primary" onclick="startGame()">🚀 ابدأ المغامرة</button>

            <div class="controls-hint">
                <kbd>␣</kbd> <kbd>↑</kbd> <kbd>W</kbd> للقفز &nbsp;·&nbsp; اضغط الشاشة أيضاً
            </div>
        </div>
    </div>

    <!-- ===== شاشة النهاية ===== -->
    <div class="screen" id="gameOverScreen">
        <div class="game-over-title">💀 انتهت الرحلة</div>
        <div class="final-score-box">
            <div class="score-label">النقاط</div>
            <div class="score-number" id="finalScore">0</div>
        </div>
        <div class="level-reached">المستوى: <span id="finalLevel">1</span></div>
        <div id="bonusMessage" class="bonus-text"></div>
        <div id="finalPlayerInfo" style="color:rgba(255,255,255,0.08);font-size:0.8rem;margin-bottom:12px;"></div>
        <div>
            <button class="btn" onclick="restartGame()">🔄 العب مرة أخرى</button>
            <button class="btn" onclick="showLogin()" style="border-color:rgba(255,80,80,0.1);">🏠 القائمة</button>
        </div>
    </div>

    <!-- ===== شريط الإحصائيات ===== -->
    <div id="statsBar">
        <div class="stat-item">👤 <span id="displayName">---</span></div>
        <div class="stat-item">⭐ <span class="highlight" id="displayScore">0</span></div>
        <div class="stat-item">🏆 <span id="displayHighScore">0</span></div>
        <div class="stat-item"><span class="level-badge" id="displayLevel">المستوى 1</span></div>
    </div>
</div>

<script>
    // ========================================================================
    //  DARK LEAP — شخصيات واضحة + قمر مصغر بجوار العنوان
    //  التعديلات: حواجز بيضاء / شخصية بيضاء بتفاصيل فنية
    // ========================================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 960,
        H = 600;

    // 🔗 رابط الـ Webhook
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1529157218094547035/4KRu-0ND_mNGJx9ZYR9D50rhyqkdr2N5Upl_E0ufyhRGEPznDFb9T11I5Lq3KsA8Poa9';

    // ==================== نجوم الخلفية ====================
    (function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 140; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            const size = 1 + Math.random() * 2.8;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.setProperty('--duration', (2 + Math.random() * 5) + 's');
            star.style.animationDelay = (Math.random() * 7) + 's';
            container.appendChild(star);
        }
    })();

    // ==================== متغيرات اللعبة ====================
    let player = {
        x: 120,
        y: 440,
        width: 34,      // أوسع قليلاً للوضوح
        height: 44,     // أطول قليلاً
        vy: 0,
        jumpPower: -11.8,
        gravity: 0.55,
        grounded: false,
        trail: []
    };

    let obstacles = [];
    let coins = [];
    let particles = [];
    let score = 0;
    let highScore = 0;
    let level = 1;
    let gameRunning = false;
    let gameLoopId = null;
    let spawnTimer = 0;
    let coinSpawnTimer = 0;
    let speed = 4.5;
    let playerName = '';
    let playerPhone = '';
    let frameCount = 0;
    let distanceTraveled = 0;
    let comboCount = 0;
    let lastCoinTime = 0;

    const LEVELS = [
        { level: 1, speed: 4.5, spawnRate: 80, coinRate: 42, obstacleHeight: [20, 35], label: 'البداية' },
        { level: 2, speed: 5.8, spawnRate: 65, coinRate: 35, obstacleHeight: [22, 38], label: 'الظلام الخفيف' },
        { level: 3, speed: 7.2, spawnRate: 50, coinRate: 28, obstacleHeight: [25, 40], label: 'الظلام العميق' },
        { level: 4, speed: 8.8, spawnRate: 38, coinRate: 22, obstacleHeight: [28, 42], label: 'الظلام المطلق' },
        { level: 5, speed: 10.5, spawnRate: 26, coinRate: 16, obstacleHeight: [30, 45], label: 'قلب الظلام' },
    ];

    const keys = {};

    // ==================== دوال الحسابات ====================
    function getPlayerData(name) {
        try {
            const data = localStorage.getItem('darkleap_' + name);
            return data ? JSON.parse(data) : null;
        } catch { return null; }
    }

    function savePlayerData(name, phone, score) {
        const data = {
            name,
            phone,
            highScore: Math.max(score, getPlayerData(name)?.highScore || 0),
            lastScore: score,
            lastPlay: new Date().toISOString()
        };
        localStorage.setItem('darkleap_' + name, JSON.stringify(data));
        return data;
    }

    // ==================== دوال المستوى ====================
    function getLevelConfig() {
        let lvl = 1;
        for (let i = LEVELS.length - 1; i >= 0; i--) {
            if (score >= i * 60 + 30) {
                lvl = i + 1;
                break;
            }
        }
        if (lvl > LEVELS.length) lvl = LEVELS.length;
        return LEVELS[lvl - 1];
    }

    function updateLevel() {
        const config = getLevelConfig();
        level = config.level;
        speed = config.speed;
        document.getElementById('displayLevel').textContent = `المستوى ${level}`;
    }

    // ==================== دوال اللعبة ====================
    function startGame() {
        const name = document.getElementById('playerName').value.trim();
        const phone = document.getElementById('playerPhone').value.trim();

        if (!name || !phone) {
            alert('الرجاء إدخال الاسم ورقم الجوال');
            return;
        }

        playerName = name;
        playerPhone = phone;

        const data = getPlayerData(name);
        highScore = data?.highScore || 0;

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('gameOverScreen').style.display = 'none';

        document.getElementById('displayName').textContent = name;
        document.getElementById('displayScore').textContent = '0';
        document.getElementById('displayHighScore').textContent = highScore;

        resetGame();
        gameRunning = true;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function resetGame() {
        player.y = 440;
        player.vy = 0;
        player.grounded = true;
        player.trail = [];
        obstacles = [];
        coins = [];
        particles = [];
        score = 0;
        speed = 4.5;
        level = 1;
        spawnTimer = 0;
        coinSpawnTimer = 0;
        frameCount = 0;
        distanceTraveled = 0;
        comboCount = 0;
        document.getElementById('displayScore').textContent = '0';
        document.getElementById('displayLevel').textContent = 'المستوى 1';
        updateLevel();
    }

    function gameLoop() {
        if (!gameRunning) return;
        frameCount++;
        update();
        draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    // ==================== التحديث ====================
    function update() {
        player.vy += player.gravity;
        player.y += player.vy;

        if (player.y >= 440) {
            player.y = 440;
            player.vy = 0;
            player.grounded = true;
        }

        if (frameCount % 2 === 0) {
            player.trail.push({ x: player.x + player.width / 2, y: player.y + player.height / 2, life: 15 });
            if (player.trail.length > 20) player.trail.shift();
        }
        for (let i = player.trail.length - 1; i >= 0; i--) {
            player.trail[i].life--;
            if (player.trail[i].life <= 0) player.trail.splice(i, 1);
        }

        if (player.grounded && (keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'])) {
            player.vy = player.jumpPower;
            player.grounded = false;
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: player.x + player.width / 2 + (Math.random() - 0.5) * 10,
                    y: player.y + player.height,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 0.5,
                    life: 15 + Math.random() * 20,
                    maxLife: 35,
                    size: 2 + Math.random() * 5,
                    color: `rgba(200,200,230,${0.05 + Math.random() * 0.08})`
                });
            }
        }

        updateLevel();
        distanceTraveled += speed * 0.05;
        const config = getLevelConfig();

        spawnTimer++;
        if (spawnTimer > config.spawnRate) {
            spawnObstacle(config);
            spawnTimer = 0;
        }

        coinSpawnTimer++;
        if (coinSpawnTimer > config.coinRate) {
            spawnCoin();
            coinSpawnTimer = 0;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= speed;
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                continue;
            }
            if (checkCollision(player, obstacles[i])) {
                endGame();
                return;
            }
        }

        for (let i = coins.length - 1; i >= 0; i--) {
            coins[i].x -= speed;
            if (coins[i].x + coins[i].width < 0) {
                coins.splice(i, 1);
                continue;
            }
            if (checkCollision(player, coins[i])) {
                const bonus = (Date.now() - lastCoinTime < 500) ? 1.5 : 1;
                lastCoinTime = Date.now();
                const points = Math.round(10 * bonus);
                score += points;
                comboCount = (bonus > 1) ? comboCount + 1 : 1;
                document.getElementById('displayScore').textContent = score;
                coins.splice(i, 1);

                for (let j = 0; j < 24; j++) {
                    particles.push({
                        x: player.x + player.width / 2,
                        y: player.y + player.height / 2,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 15 + Math.random() * 20,
                        maxLife: 35,
                        size: 2 + Math.random() * 6,
                        color: `rgba(255,215,0,${0.2 + Math.random() * 0.6})`
                    });
                }
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx || 0;
            p.y += p.vy || 0;
            p.life--;
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        if (score > highScore) {
            highScore = score;
            document.getElementById('displayHighScore').textContent = highScore;
        }
    }

    // ==================== spawn ====================
    function spawnObstacle(config) {
        const minH = config.obstacleHeight[0];
        const maxH = config.obstacleHeight[1];
        const height = minH + Math.random() * (maxH - minH);
        const width = 14 + Math.random() * 22;
        const type = Math.random() < 0.12 ? 'double' : 'normal';

        obstacles.push({
            x: W,
            y: 450 - height,
            width: width,
            height: height,
            type: type,
            // حواجز بيضاء مع لمسة فنية
            color: `rgba(230, 230, 250, ${0.6 + Math.random() * 0.3})`,
            glow: 0.04 + Math.random() * 0.06
        });

        if (type === 'double') {
            obstacles.push({
                x: W + width + 20 + Math.random() * 30,
                y: 450 - (height * 0.7),
                width: width * 0.7,
                height: height * 0.7,
                type: 'normal',
                color: `rgba(220, 220, 245, ${0.5 + Math.random() * 0.3})`,
                glow: 0.03 + Math.random() * 0.05
            });
        }
    }

    function spawnCoin() {
        const yPos = 180 + Math.random() * 220;
        coins.push({
            x: W,
            y: yPos,
            width: 18,
            height: 18,
            floatOffset: Math.random() * Math.PI * 2
        });
    }

    // ==================== التصادم ====================
    function checkCollision(a, b) {
        const shrink = 5;
        return a.x + shrink < b.x + b.width - shrink &&
            a.x + a.width - shrink > b.x + shrink &&
            a.y + shrink < b.y + b.height - shrink &&
            a.y + a.height - shrink > b.y + shrink;
    }

    // ==================== الرسم ====================
    function draw() {
        // خلفية درامية
        const bgGrad = ctx.createRadialGradient(480, 280, 100, 480, 280, 700);
        bgGrad.addColorStop(0, '#14141f');
        bgGrad.addColorStop(0.5, '#0a0a14');
        bgGrad.addColorStop(1, '#030308');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        // أرضية مع تدرج
        const groundGrad = ctx.createLinearGradient(0, 450, 0, H);
        groundGrad.addColorStop(0, 'rgba(30,25,55,0.7)');
        groundGrad.addColorStop(0.3, 'rgba(18,12,35,0.85)');
        groundGrad.addColorStop(1, '#040408');
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, 450, W, H - 450);

        // خط أرضي متوهج خفيف
        ctx.shadowColor = 'rgba(180,170,255,0.08)';
        ctx.shadowBlur = 30;
        ctx.strokeStyle = 'rgba(200,190,255,0.08)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 450);
        ctx.lineTo(W, 450);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // أثر اللاعب (ضوء باهت)
        for (let t of player.trail) {
            const alpha = t.life / 15 * 0.08;
            ctx.fillStyle = `rgba(210,210,255,${alpha})`;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // ===== العوائق (بيضاء مع توهج فني) =====
        for (let obs of obstacles) {
            // توهج خلفي
            ctx.shadowColor = 'rgba(200,200,255,0.08)';
            ctx.shadowBlur = 35;
            
            // جسم الحاجز بلون أبيض شفاف مع تدرج
            const grad = ctx.createLinearGradient(obs.x, obs.y, obs.x + obs.width, obs.y + obs.height);
            grad.addColorStop(0, `rgba(240, 240, 255, ${0.7 + Math.random() * 0.2})`);
            grad.addColorStop(0.5, `rgba(220, 220, 250, ${0.5 + Math.random() * 0.2})`);
            grad.addColorStop(1, `rgba(200, 200, 230, ${0.4 + Math.random() * 0.2})`);
            
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 5);
            ctx.fill();

            // حدود مضيئة
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 5);
            ctx.stroke();

            // خطوط داخلية فنية
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(obs.x + 4, obs.y + 4);
            ctx.lineTo(obs.x + obs.width - 4, obs.y + obs.height - 4);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(obs.x + obs.width - 4, obs.y + 4);
            ctx.lineTo(obs.x + 4, obs.y + obs.height - 4);
            ctx.stroke();
        }
        ctx.shadowBlur = 0;

        // ===== العملات الذهبية (مثل السابق) =====
        for (let coin of coins) {
            const floatY = Math.sin(frameCount * 0.045 + (coin.floatOffset || 0)) * 4;
            const cx = coin.x + coin.width / 2;
            const cy = coin.y + coin.height / 2 + floatY;
            const r = coin.width / 2;

            ctx.shadowColor = 'rgba(255,215,0,0.3)';
            ctx.shadowBlur = 40;

            const gradCoin = ctx.createRadialGradient(cx - 3, cy - 3, 2, cx, cy, r);
            gradCoin.addColorStop(0, '#ffec80');
            gradCoin.addColorStop(0.4, '#ffd700');
            gradCoin.addColorStop(0.8, '#d4a800');
            gradCoin.addColorStop(1, '#a07800');
            ctx.fillStyle = gradCoin;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(cx - 3, cy - 4, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.arc(cx + 4, cy + 3, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        // ===== الشخصية (بيضاء مع تفاصيل فنية واضحة) =====
        ctx.shadowColor = 'rgba(200,200,255,0.1)';
        ctx.shadowBlur = 50;

        // جسم الشخصية - تدرج أبيض / فضي
        const pGrad = ctx.createRadialGradient(
            player.x + player.width / 2 - 6, player.y + player.height / 2 - 6, 6,
            player.x + player.width / 2, player.y + player.height / 2, 40
        );
        pGrad.addColorStop(0, '#ffffff');
        pGrad.addColorStop(0.2, '#f0f0ff');
        pGrad.addColorStop(0.5, '#d8d8f0');
        pGrad.addColorStop(0.8, '#b8b8d0');
        pGrad.addColorStop(1, '#9898b0');
        ctx.fillStyle = pGrad;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width, player.height, 7);
        ctx.fill();

        // إطار فاتح للشخصية
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width, player.height, 7);
        ctx.stroke();

        // عيون متوهجة (بيضاء مع توهج أزرق)
        ctx.shadowBlur = 25;
        ctx.shadowColor = 'rgba(150,180,255,0.2)';
        
        // العين اليسرى
        ctx.fillStyle = 'rgba(200,220,255,0.2)';
        ctx.fillRect(player.x + 6, player.y + 10, 8, 8);
        // العين اليمنى
        ctx.fillRect(player.x + player.width - 14, player.y + 10, 8, 8);
        
        // حدقة (توهج أزرق)
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(100,150,255,0.3)';
        ctx.fillStyle = 'rgba(120,180,255,0.4)';
        ctx.fillRect(player.x + 8, player.y + 12, 4, 4);
        ctx.fillRect(player.x + player.width - 12, player.y + 12, 4, 4);

        // خطوط تفاصيل على الجسم (فنية)
        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'rgba(200,200,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(player.x + 4, player.y + 6);
        ctx.lineTo(player.x + player.width - 4, player.y + 6);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(player.x + 6, player.y + 22);
        ctx.lineTo(player.x + player.width - 6, player.y + 22);
        ctx.stroke();

        // توهج تحت اللاعب (انعكاس أرضي)
        ctx.shadowColor = 'rgba(200,200,255,0.04)';
        ctx.shadowBlur = 60;
        ctx.fillStyle = 'rgba(200,200,255,0.02)';
        ctx.beginPath();
        ctx.ellipse(player.x + player.width / 2, player.y + player.height + 10, 30, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // ===== الجزيئات =====
        for (let p of particles) {
            const alpha = p.life / p.maxLife;
            ctx.globalAlpha = alpha * 0.8;
            ctx.fillStyle = p.color || 'rgba(255,255,255,0.05)';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(180,180,255,0.03)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        // ===== معلومات إضافية فنية =====
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.font = '12px Cairo, sans-serif';
        ctx.fillText(`المسافة: ${Math.floor(distanceTraveled)}`, W - 130, 38);

        if (comboCount > 2) {
            ctx.fillStyle = `rgba(255,215,0,${0.08 + Math.sin(frameCount * 0.08) * 0.04})`;
            ctx.font = '16px Cairo, sans-serif';
            ctx.fillText(`🔥 ×${comboCount}`, W - 130, 58);
        }

        ctx.fillStyle = 'rgba(200,200,255,0.03)';
        ctx.font = '13px Cairo, sans-serif';
        ctx.fillText(`✦ المستوى ${level}`, 18, 35);

        // لمسة نهائية: توهج عام خفيف
        ctx.fillStyle = `rgba(200,200,255,${0.002 + Math.sin(frameCount * 0.02) * 0.001})`;
        ctx.fillRect(0, 0, W, H);
    }

    // ==================== إنهاء اللعبة ====================
    function endGame() {
        gameRunning = false;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);

        const data = savePlayerData(playerName, playerPhone, score);

        let bonus = 0;
        let bonusMsg = '';
        if (score >= 150) { bonus = 60;
            bonusMsg = '🎉 مكافأة ذهبية: 60 نقطة!'; } else if (score >= 100) { bonus = 40;
            bonusMsg = '✨ مكافأة فضية: 40 نقطة!'; } else if (score >= 50) { bonus = 20;
            bonusMsg = '⭐ مكافأة برونزية: 20 نقطة!'; } else {
            bonusMsg = '💪 اجمع 50 نقطة للحصول على مكافأة!'; }

        const finalScore = score + bonus;

        sendToDiscord(playerName, playerPhone, finalScore, data.highScore, level);

        document.getElementById('finalScore').textContent = finalScore;
        document.getElementById('finalLevel').textContent = level;
        document.getElementById('finalPlayerInfo').textContent = `👤 ${playerName} · 📱 ${playerPhone}`;

        const msgEl = document.getElementById('bonusMessage');
        msgEl.textContent = bonusMsg;
        if (bonus > 0) {
            msgEl.style.color = '#ffd700';
            msgEl.style.borderColor = 'rgba(255,215,0,0.1)';
        } else {
            msgEl.style.color = 'rgba(255,255,255,0.1)';
            msgEl.style.borderColor = 'rgba(255,255,255,0.02)';
        }

        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    // ==================== إعادة التشغيل ====================
    function restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        resetGame();
        gameRunning = true;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function showLogin() {
        gameRunning = false;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('loginScreen').style.display = 'flex';
        resetGame();
    }

    // ==================== 📤 إرسال إلى Discord ====================
    function sendToDiscord(name, phone, score, highScore, level) {
        try {
            const message = {
                embeds: [{
                    title: '🌑 Dark Leap - نتيجة اللعبة',
                    color: 0x2b1a4a,
                    fields: [
                        { name: '👤 الاسم', value: name, inline: true },
                        { name: '📱 الجوال', value: phone, inline: true },
                        { name: '⭐ النقاط النهائية', value: `${score}`, inline: true },
                        { name: '🏆 أعلى نتيجة', value: `${highScore}`, inline: true },
                        { name: '📊 المستوى', value: `${level}`, inline: true },
                        { name: '📅 التاريخ', value: new Date().toLocaleString('ar-SA'), inline: false }
                    ],
                    footer: { text: 'Dark Leap · القفز في الظلام' },
                    timestamp: new Date().toISOString()
                }]
            };

            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message)
            })
            .then(response => {
                if (response.ok) {
                    console.log('✅ تم الإرسال إلى Discord بنجاح');
                } else {
                    console.log('⚠️ فشل الإرسال إلى Discord');
                }
            })
            .catch(err => {
                console.log('⚠️ خطأ في الإرسال:', err);
            });
        } catch (e) {
            console.log('⚠️ خطأ في الإرسال:', e);
        }
    }

    // ==================== أحداث ====================
    document.addEventListener('keydown', (e) => {
        keys[e.key] = true;
        if ([' ', 'ArrowUp', 'w', 'W'].includes(e.key)) e.preventDefault();
    });
    document.addEventListener('keyup', (e) => { keys[e.key] = false; });

    canvas.addEventListener('click', () => {
        if (gameRunning && player.grounded) {
            player.vy = player.jumpPower;
            player.grounded = false;
        }
    });

    // ==================== polyfill ====================
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (r > w / 2) r = w / 2;
            if (r > h / 2) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
    }

    // ==================== التشغيل ====================
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('gameOverScreen').style.display = 'none';
    document.getElementById('statsBar').style.display = 'none';

    ctx.fillStyle = '#0a0a12';
    ctx.fillRect(0, 0, W, H);
</script>
