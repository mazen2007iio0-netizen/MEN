<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEN Ai</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #000000;
            color: #f0f4ff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #021ca4, #1a3a9e);
            border-radius: 12px;
        }

        .bg-ambient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(2, 28, 164, 0.15) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(26, 58, 158, 0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #000000 0%, #000000 100%);
            animation: ambientFloat 20s ease-in-out infinite alternate;
        }
        @keyframes ambientFloat {
            0% {
                transform: scale(1) rotate(0deg);
            }
            100% {
                transform: scale(1.05) rotate(2deg);
            }
        }

        .container {
            width: 92%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 18px;
        }
        :root {
            --blue-deep: #021ca4;
            --blue-mid: #1a3a9e;
            --blue-light: #4a7aff;
            --blue-glow: rgba(74, 122, 255, 0.2);
            --card-bg: rgba(10, 16, 32, 0.85);
            --card-border: rgba(2, 28, 164, 0.25);
            --radius-xl: 24px;
            --radius-2xl: 40px;
            --glow-neon: 0 0 30px rgba(74, 122, 255, 0.15);
        }

        header {
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(2, 28, 164, 0.10);
            padding: 12px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(2, 28, 164, 0.15);
            border-radius: 40px;
            padding: 0 18px;
            height: 44px;
            color: #a0b0d4;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
        }
        .btn-back i {
            font-size: 1.2rem;
        }
        .btn-back .back-text {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }
        .btn-back:hover {
            background: rgba(74, 122, 255, 0.1);
            border-color: var(--blue-light);
            color: #fff;
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.1);
        }
        .btn-back:active {
            transform: scale(0.95);
        }

        .logo img {
            height: 48px;
            filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(74, 122, 255, 0.3));
        }
        .logo h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 40%, var(--blue-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 40px rgba(74, 122, 255, 0.2);
        }
        .logo h1 i {
            color: var(--blue-light);
            margin-left: 8px;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 20px rgba(74, 122, 255, 0.3));
            animation: sparkle 2s ease-in-out infinite alternate;
        }
        @keyframes sparkle {
            0% {
                filter: drop-shadow(0 0 10px rgba(74, 122, 255, 0.2));
                transform: scale(1) rotate(0deg);
            }
            100% {
                filter: drop-shadow(0 0 30px rgba(74, 122, 255, 0.6));
                transform: scale(1.1) rotate(10deg);
            }
        }

        .chat-wrapper {
            margin: 20px 0;
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-2xl);
            overflow: hidden;
            box-shadow: var(--glow-neon);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 160px);
            min-height: 500px;
        }

        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(2, 28, 164, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            background: rgba(0, 0, 0, 0.4);
        }
        .chat-header .bot-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .chat-header .bot-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #fff;
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.2);
            overflow: hidden;
        }
        .chat-header .bot-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0) invert(1);
        }
        .chat-header .bot-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-header .bot-name img {
            height: 28px;
            filter: brightness(0) invert(1);
        }

        .messages-area {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
        }
        .messages-area::-webkit-scrollbar {
            width: 4px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: var(--blue-deep);
            border-radius: 12px;
        }

        .message {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: var(--radius-xl);
            animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            word-wrap: break-word;
            line-height: 1.7;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
            border-bottom-left-radius: 6px;
            box-shadow: 0 4px 20px rgba(2, 28, 164, 0.2);
        }
        .message.bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(2, 28, 164, 0.08);
            border-bottom-right-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .message .msg-time {
            font-size: 0.65rem;
            color: #6a708a;
            margin-top: 6px;
            display: block;
            text-align: left;
        }
        .message.user .msg-time {
            text-align: right;
        }

        /* ===== عرض المنتجات والاقتراحات في صف واحد جنباً إلى جنب ===== */
        .products-row-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 6px 0 12px 0;
            margin: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--blue-deep) transparent;
        }
        .products-row-wrapper::-webkit-scrollbar {
            height: 4px;
        }
        .products-row-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .products-row-wrapper::-webkit-scrollbar-thumb {
            background: var(--blue-deep);
            border-radius: 12px;
        }

        .products-row {
            display: flex;
            flex-wrap: nowrap;
            gap: 18px;
            width: max-content;
            min-width: 100%;
            padding: 2px 2px 6px 2px;
        }

        .products-row .men-product-card {
            min-width: 260px;
            max-width: 280px;
            flex: 0 0 auto;
            margin: 0;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .products-row .men-product-card:hover {
            transform: translateY(-6px) scale(1.02);
        }
        .products-row .men-product-card .product-image {
            height: 160px;
            object-fit: cover;
        }
        .products-row .men-product-card .product-content {
            padding: 14px 16px 16px;
        }
        .products-row .men-product-card .product-content h2 {
            font-size: 1.2rem;
            margin: 8px 0 4px;
        }
        .products-row .men-product-card .product-content p {
            font-size: 0.8rem;
            margin: 4px 0 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .products-row .men-product-card .price {
            font-size: 1.2rem;
        }
        .products-row .men-product-card .btn-product {
            padding: 6px 14px;
            font-size: 0.75rem;
        }
        .products-row .men-product-card .badge {
            font-size: 0.7rem;
            padding: 4px 12px;
        }

        /* اقتراحات بتصميم مختلف للنصوص متوافقة مع عرض المنتجات الأفقي */
        .suggestions-row-card {
            min-width: 240px;
            max-width: 260px;
            flex: 0 0 auto;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(74, 122, 255, 0.2);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
            transition: 0.3s;
            cursor: pointer;
        }
        .suggestions-row-card:hover {
            border-color: var(--blue-light);
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(74, 122, 255, 0.15);
        }
        .suggestions-row-card .sug-badge {
            font-size: 0.7rem;
            color: var(--blue-light);
            background: rgba(74, 122, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            width: max-content;
        }
        .suggestions-row-card p {
            font-size: 0.9rem;
            color: #d0dcf5;
            line-height: 1.5;
        }
        .suggestions-row-card .sug-action {
            font-size: 0.75rem;
            color: var(--blue-light);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .welcome-animation {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
            width: 100%;
        }
        .welcome-main {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 4px;
        }
        .welcome-main .letter {
            display: inline-block;
            background: linear-gradient(135deg, #ffffff 20%, var(--blue-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: bounceGlow 1.8s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(74, 122, 255, 0.2);
            transform-origin: center bottom;
        }
        @keyframes bounceGlow {
            0% {
                transform: translateY(0px) scale(1);
                filter: drop-shadow(0 0 5px rgba(74, 122, 255, 0.1));
            }
            100% {
                transform: translateY(-12px) scale(1.08);
                filter: drop-shadow(0 0 25px rgba(74, 122, 255, 0.6));
            }
        }

        .typewriter-container {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 2px;
            min-height: 2.8rem;
            direction: rtl;
        }
        .typewriter-text {
            display: inline;
            color: #c0ccf0;
        }
        .typewriter-text .highlight {
            background: linear-gradient(135deg, var(--blue-light), #a0c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 900;
        }
        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1.8rem;
            background: var(--blue-light);
            margin-right: 4px;
            animation: blinkCursor 0.7s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .welcome-desc {
            font-size: 0.95rem;
            color: #8a9abb;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1.8s forwards;
        }
        .welcome-desc i {
            color: var(--blue-light);
            animation: spinSlow 4s linear infinite;
        }
        @keyframes spinSlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            align-self: flex-start;
            display: none;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-xl);
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(2, 28, 164, 0.08);
            gap: 10px;
            align-items: center;
            color: #a0b0d4;
            font-size: 0.95rem;
        }
        .typing-indicator .dots {
            display: flex;
            gap: 5px;
        }
        .typing-indicator .dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--blue-light);
            display: inline-block;
            animation: typingBounce 1.4s ease-in-out infinite;
        }
        .typing-indicator .dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator .dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
        .typing-indicator i {
            color: var(--blue-light);
            animation: spin 1s linear infinite;
            font-size: 1.1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .suggested-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 20px 4px 20px;
            background: rgba(0, 0, 0, 0.25);
            border-top: 1px solid rgba(2, 28, 164, 0.08);
            transition: all 0.3s ease;
        }
        .suggested-questions.hidden {
            display: none;
        }
        .suggested-questions .sq-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(74, 122, 255, 0.15);
            border-radius: 30px;
            padding: 8px 18px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            color: #b0c4e8;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .suggested-questions .sq-btn i {
            font-size: 0.8rem;
            opacity: 0.6;
        }
        .suggested-questions .sq-btn:hover {
            background: rgba(74, 122, 255, 0.08);
            border-color: var(--blue-light);
            color: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 4px 20px rgba(74, 122, 255, 0.05);
        }
        .suggested-questions .sq-btn:active {
            transform: scale(0.95);
        }

        .input-area {
            padding: 12px 20px 16px;
            border-top: 1px solid rgba(2, 28, 164, 0.08);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            flex-wrap: wrap;
        }
        .input-area .input-wrapper {
            flex: 1;
            min-width: 150px;
            display: flex;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-xl);
            border: 1.5px solid rgba(2, 28, 164, 0.1);
            transition: 0.3s;
            padding: 4px 16px 4px 8px;
            min-height: 52px;
        }
        .input-area .input-wrapper:focus-within {
            border-color: var(--blue-light);
            box-shadow: 0 0 30px rgba(74, 122, 255, 0.05);
        }
        .input-area .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #f0f4ff;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            resize: none;
            padding: 12px 4px;
            min-height: 44px;
            max-height: 150px;
            line-height: 1.6;
        }
        .input-area .input-wrapper textarea::placeholder {
            color: #5a607a;
        }
        .input-area .input-wrapper .char-count {
            font-size: 0.7rem;
            color: #4a5070;
            padding: 8px 4px;
            white-space: nowrap;
            direction: ltr;
        }

        .input-area .btn-send {
            width: 52px;
            height: 52px;
            min-width: 52px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(2, 28, 164, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transform: none;
        }
        .input-area .btn-send::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(74, 122, 255, 0.4), transparent);
            opacity: 0;
            transition: 0.6s;
        }
        .input-area .btn-send:hover::after {
            opacity: 1;
        }
        .input-area .btn-send:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 40px rgba(2, 28, 164, 0.4);
        }
        .input-area .btn-send:active {
            transform: scale(0.92);
        }
        .input-area .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: scale(1);
        }

        .input-area .btn-voice {
            width: 52px;
            height: 52px;
            min-width: 52px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(2, 28, 164, 0.2);
            color: #a0b0d4;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .input-area .btn-voice:hover {
            background: rgba(74, 122, 255, 0.08);
            border-color: var(--blue-light);
            color: #fff;
            transform: scale(1.05);
        }
        .input-area .btn-voice:active {
            transform: scale(0.92);
        }

        .input-area .btn-voice.recording {
            background: rgba(255, 50, 50, 0.2);
            border-color: #ff4444;
            color: #ff4444;
            animation: pulseMic 1s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }
        .input-area .btn-voice.recording::before,
        .input-area .btn-voice.recording::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            border: 2px solid rgba(255, 68, 68, 0.4);
            animation: ripple 1.5s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }
        .input-area .btn-voice.recording::after {
            animation-delay: 0.75s;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        @keyframes pulseMic {
            0%, 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 68, 68, 0.2); }
            50% { transform: scale(1.12); box-shadow: 0 0 30px rgba(255, 68, 68, 0.5); }
        }
        .input-area .btn-voice:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-area .btn-attach {
            width: 52px;
            height: 52px;
            min-width: 52px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(2, 28, 164, 0.2);
            color: #a0b0d4;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .input-area .btn-attach:hover {
            background: rgba(74, 122, 255, 0.08);
            border-color: var(--blue-light);
            color: #fff;
            transform: scale(1.05);
        }
        .input-area .btn-attach:active {
            transform: scale(0.92);
        }
        .input-area .btn-attach input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            font-size: 0;
        }
        .input-area .btn-attach.has-file {
            border-color: var(--blue-light);

    <script>
        let responses = {};
        let keywordsMap = {};
        let products = [];

        const SUBSCRIPTION_KEYWORDS = [
            'اشتراك', 'اشترك', 'اشتري', 'شراء', 'طلب', 'طلب منتج',
            'MEN', 'pro', 'باقة', 'عرض', 'خصم', 'سعر', 'كم سعر',
            'كيف اشترك', 'اريد اشتراك', 'ابي اشتراك', 'ابغى اشتراك'
        ];

        let attachedFile = null;
        let extractedText = '';

        function getReply(category) {
            const list = responses[category]?.responses;
            if (!list || list.length === 0) {
                return getReply('default');
            }
            const randomIndex = Math.floor(Math.random() * list.length);
            return list[randomIndex];
        }

        function buildKeywordsMap(data) {
            const map = {};
            for (const [cat, obj] of Object.entries(data)) {
                if (obj.keywords && Array.isArray(obj.keywords)) {
                    map[cat] = obj.keywords.map(k => k.toLowerCase());
                }
            }
            return map;
        }

        // استخراج الكلمات المتشابهة وتقديم اقتراحات أفقية (اقتراح واحد أو اثنين بتصميم نص مختلف)
        function findSuggestionsOrMatches(queryText) {
            const lower = queryText.trim().toLowerCase();
            const matchedCategories = [];

            for (const [cat, patterns] of Object.entries(keywordsMap)) {
                for (const pattern of patterns) {
                    if (lower.includes(pattern) && !matchedCategories.includes(cat)) {
                        matchedCategories.push(cat);
                    }
                }
            }

            if (matchedCategories.length > 0) {
                let html = '<div class="products-row-wrapper"><div class="products-row">';
                // جلب اقتراحين كحد أقصى لتصميم النصوص
                const limit = Math.min(matchedCategories.length, 2);
                for (let i = 0; i < limit; i++) {
                    const cat = matchedCategories[i];
                    const replyText = getReply(cat);
                    html += `
                        <div class="suggestions-row-card" onclick="selectSuggestion('${cat}')">
                            <span class="sug-badge"><i class="fas fa-lightbulb"></i> اقتراح ${i + 1} (${cat})</span>
                            <p>${replyText}</p>
                            <div class="sug-action">عرض الإجابة <i class="fas fa-arrow-left"></i></div>
                        </div>
                    `;
                }
                html += '</div></div>';
                return { type: 'suggestions', content: html };
            }
            return null;
        }

        window.selectSuggestion = function(category) {
            const replyText = getReply(category);
            const botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            botMsg.innerHTML = `💡 بناءً على اختيارك للاقتراح:<br><br>${replyText}<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(botMsg);
            scrollToBottom();
        }

        function evaluateMath(text) {
            const mathRegex = /(\d+)\s*([+\-*/])\s*(\d+)/;
            const match = text.match(mathRegex);
            if (match) {
                const a = parseFloat(match[1]);
                const op = match[2];
                const b = parseFloat(match[3]);
                if (isNaN(a) || isNaN(b)) return null;
                let result;
                switch (op) {
                    case '+': result = a + b; break;
                    case '-': result = a - b; break;
                    case '*': result = a * b; break;
                    case '/':
                        if (b === 0) return 'لا يمكن القسمة على صفر';
                        result = a / b;
                        break;
                    default: return null;
                }
                return Number.isInteger(result) ? result : result.toFixed(2);
            }
            return null;
        }

        function findProduct(text) {
            const lower = text.trim().toLowerCase();
            for (const product of products) {
                if (product.keywords && Array.isArray(product.keywords)) {
                    for (const keyword of product.keywords) {
                        if (lower.includes(keyword.toLowerCase())) {
                            return product;
                        }
                    }
                }
                const name = (product.name || '').toLowerCase();
                const desc = (product.description || '').toLowerCase();
                if (name.includes(lower) || lower.includes(name) || desc.includes(lower) || lower.includes(desc)) {
                    return product;
                }
            }
            return null;
        }

        function isSubscriptionRequest(text) {
            const lower = text.trim().toLowerCase();
            for (const keyword of SUBSCRIPTION_KEYWORDS) {
                if (lower.includes(keyword.toLowerCase())) {
                    return true;
                }
            }
            return false;
        }

        function buildAllProductsRow() {
            if (!products || products.length === 0) {
                return '<p style="color: #8a9abb; padding: 10px 0;">لا توجد منتجات متاحة حالياً.</p>';
            }
            let cardsHtml = '<div class="products-row-wrapper"><div class="products-row">';
            for (const product of products) {
                cardsHtml += buildProductCard(product);
            }
            cardsHtml += '</div></div>';
            return cardsHtml;
        }

        function buildProductCard(product) {
            const image = product.image || 'images/default.png';
            const name = product.name || 'منتج';
            const description = product.description || 'لا يوجد وصف';
            const price = product.price || '0';
            const currency = product.currency || 'ر.س';
            const badge = product.badge || ' منتج';
            const link = product.link || '#';

            return `
                <div class="men-product-card">
                    <img src="${image}" class="product-image" alt="${name}" onerror="this.src='images/default.png'">
                    <div class="product-content">
                        <span class="badge">${badge}</span>
                        <h2>${name}</h2>
                        <p>${description}</p>
                        <div class="bottom">
                            <div class="price">
                                ${price} <small>${currency}</small>
                            </div>
                            <button class="btn-product" onclick="window.location.href='${link}'">
                                <i class="fas fa-arrow-left"></i> عرض
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        async function extractTextFromFile(file) {
            const fileType = file.type;
            const fileName = file.name.toLowerCase();

            if (fileType.startsWith('image/')) {
                try {
                    const imageUrl = URL.createObjectURL(file);
                    const result = await Tesseract.recognize(imageUrl, 'ara');
                    URL.revokeObjectURL(imageUrl);
                    return result.data.text || 'لم يتم التعرف على أي نص في الصورة.';
                } catch (error) {
                    return 'حدث خطأ أثناء معالجة الصورة.';
                }
            }

            if (fileType === 'text/plain' || fileName.endsWith('.txt')) {
                try {
                    return await file.text() || 'الملف فارغ.';
                } catch (error) {
                    return 'حدث خطأ أثناء قراءة الملف النصي.';
                }
            }

            if (fileType === 'application/pdf' || fileName.endsWith('.pdf')) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    let fullText = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(' ');
                        fullText += pageText + '\n';
                    }
                    return fullText || 'لم يتم العثور على نص في ملف PDF.';
                } catch (error) {
                    return 'حدث خطأ أثناء قراءة ملف PDF.';
                }
            }

            if (fileType.includes('wordprocessingml') || fileName.endsWith('.docx')) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                    return result.value || 'الملف فارغ.';
                } catch (error) {
                    return 'حدث خطأ أثناء قراءة ملف Word.';
                }
            }

            if (fileType.includes('sheet') || fileName.endsWith('.xlsx') || fileName.endsWith('.xls') || fileName.endsWith('.csv')) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                    let allText = '';
                    workbook.SheetNames.forEach(sheetName => {
                        const sheet = workbook.Sheets[sheetName];
                        const json = XLSX.utils.sheet_to_json(sheet);
                        if (json.length > 0) {
                            allText += `\n--- ${sheetName} ---\n`;
                            json.forEach(row => {
                                allText += Object.values(row).join(' | ') + '\n';
                            });
                        }
                    });
                    return allText || 'لم يتم العثور على بيانات.';
                } catch (error) {
                    return 'حدث خطأ أثناء قراءة ملف البيانات.';
                }
            }

            return '⚠️ نوع الملف غير مدعوم للاستخراج التلقائي.';
        }

        // قارئ الملفات المحدث: يعرض الكلمة المفتاحية المستخرجة ويجيب على أي شيء نص أو منتج
        function showExtractedTextWithKeywords(text, fileName) {
            const modal = document.getElementById('extractModal');
            const textArea = document.getElementById('extractedText');
            
            // استخراج كلمات مفتاحية بسيطة أو أول 200 حرف كملخص
            const snippet = text.length > 300 ? text.substring(0, 300) + '...' : text;
            textArea.innerHTML = `<strong>اسم الملف:</strong> ${fileName}\n\n` +
                                 `<strong>النص المستخلص / الكلمات المفتاحية:</strong>\n${snippet}`;
            modal.classList.add('active');
        }

        document.getElementById('modalClose').addEventListener('click', function() {
            document.getElementById('extractModal').classList.remove('active');
        });

        function hideAttachedFile() {
            attachedFile = null;
            extractedText = '';
            filePreview.classList.remove('visible');
            attachBtn.classList.remove('has-file');
            fileInput.value = '';
        }

        const fileInput = document.getElementById('fileInput');
        const attachBtn = document.getElementById('attachBtn');
        const filePreview = document.getElementById('filePreview');
        const fileNameSpan = document.getElementById('fileName');
        const removeFileBtn = document.getElementById('removeFile');

        fileInput.addEventListener('change', async function(e) {
            const file = this.files[0];
            if (!file) return;

            attachedFile = file;
            fileNameSpan.textContent = file.name.length > 20 ? file.name.substring(0, 18) + '...' : file.name;
            filePreview.classList.add('visible');
            attachBtn.classList.add('has-file');

            const text = await extractTextFromFile(file);
            extractedText = text;

            showExtractedTextWithKeywords(text, file.name);

            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `📎 <strong>${file.name}</strong> (تم استخراج النص وتحليل الكلمات المفتاحية)` + `<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(userMsg);
            scrollToBottom();

            await processExtractedText(text, file.name);
        });

        removeFileBtn.addEventListener('click', function() {
            hideAttachedFile();
        });

        async function processExtractedText(text, fileName) {
            if (isProcessing) return;
            isProcessing = true;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;

            try {
                typingIndicator.style.display = 'flex';
                scrollToBottom();
                await delay(800);
                typingIndicator.style.display = 'none';

                let reply = await generateSmartReply(text);

                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                messagesArea.appendChild(botMsg);
                scrollToBottom();

                let replyContent = '';
                if (reply.type === 'products' || reply.type === 'product' || reply.type === 'suggestions') {
                    botMsg.innerHTML = `📄 نتائج التحليل والكلمات المفتاحية من الملف "${fileName}":<br><br>` + reply.content + `<span class="msg-time">الآن</span>`;
                    replyContent = 'تم عرض محتوى التحليل';
                } else {
                    botMsg.innerHTML = `📄 نتائج التحليل من الملف "${fileName}":<br><br>`;
                    await typeText(botMsg, reply.content, 22);
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'msg-time';
                    timeSpan.textContent = 'الآن';
                    botMsg.appendChild(timeSpan);
                    replyContent = reply.content;
                }

                await sendToDiscord(`[ملف: ${fileName}]`, replyContent);
            } catch (error) {
                console.error(error);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                voiceBtn.disabled = false;
                messageInput.focus();
                scrollToBottom();
            }
        }

        async function generateSmartReply(text) {
            const mathResult = evaluateMath(text);
            if (mathResult !== null) {
                return { type: 'text', content: `النتيجة الرياضية هي: **${mathResult}**` };
            }

            if (isSubscriptionRequest(text)) {
                return { type: 'products', content: buildAllProductsRow() };
            }

            const product = findProduct(text);
            if (product) {
                const cardHtml = buildProductCard(product);
                return {
                    type: 'product',
                    content: `<div class="products-row-wrapper"><div class="products-row">${cardHtml}</div></div>`
                };
            }

            // فحص الاقتراحات المتعددة والكلمات المتشابهة
            const suggestions = findSuggestionsOrMatches(text);
            if (suggestions) {
                return suggestions;
            }

            let category = getCategoryForText(text);
            if (category !== 'default' && responses[category]) {
                return { type: 'text', content: getReply(category) };
            }

            return { type: 'text', content: getReply('default') };
        }

        function getCategoryForText(text) {
            const lower = text.trim().toLowerCase();
            for (const [cat, patterns] of Object.entries(keywordsMap)) {
                for (const pattern of patterns) {
                    if (lower.includes(pattern)) {
                        return cat;
                    }
                }
            }
            return 'default';
        }

        function buildWelcomeMessage() {
            return `
                <div class="welcome-animation">
                    <div class="welcome-main">
                        <span class="letter" style="animation-delay: 0s;">م</span>
                        <span class="letter" style="animation-delay: 0.12s;">ر</span>
                        <span class="letter" style="animation-delay: 0.24s;">ح</span>
                        <span class="letter" style="animation-delay: 0.36s;">با</span>
                    </div>
                    <div class="typewriter-container">
                        <span class="typewriter-text" id="typewriterText"></span>
                        <span class="typewriter-cursor" id="typewriterCursor"></span>
                    </div>
                    <div class="welcome-desc">
                        <i class="fas fa-circle-notch"></i> أنا هنا لمساعدتك في أي نص أو منتج!
                    </div>
                </div>
            `;
        }

        function typeTextEffect(element, text, speed = 60) {
            return new Promise((resolve) => {
                let index = 0;
                element.textContent = '';
                const interval = setInterval(() => {
                    if (index < text.length) {
                        element.textContent += text.charAt(index);
                        index++;
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, speed);
            });
        }

        const messagesArea = document.getElementById('messagesArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const charCount = document.getElementById('charCount');
        const typingIndicator = document.getElementById('typingIndicator');
        const backBtn = document.getElementById('backBtn');
        const suggestedQuestions = document.getElementById('suggestedQuestions');
        const voiceBtn = document.getElementById('voiceBtn');

        let isProcessing = false;
        let recognition = null;
        let isRecording = false;

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return null;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new SpeechRecognition();
            rec.lang = 'ar-SA';
            rec.continuous = false;
            rec.interimResults = true;

            rec.onresult = function(event) {
                let finalText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) finalText += event.results[i][0].transcript;
                }
                if (finalText) {
                    messageInput.value = finalText;
                    charCount.textContent = finalText.length;
                    sendMessage();
                }
            };
            rec.onend = () => stopRecording();
            return rec;
        }

        function startRecording() {
            if (isRecording) { stopRecording(); return; }
            if (!recognition) { recognition = initSpeechRecognition(); if (!recognition) return; }
            recognition.start();
            isRecording = true;
            voiceBtn.classList.add('recording');
            voiceBtn.innerHTML = '<i class="fas fa-stop"></i>';
        }

        function stopRecording() {
            if (recognition) try { recognition.stop(); } catch(e){}
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        }

        voiceBtn.addEventListener('click', (e) => { e.preventDefault(); if (!isProcessing) startRecording(); });

        document.querySelectorAll('.sq-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const question = this.dataset.question;
                if (question) {
                    messageInput.value = question;
                    charCount.textContent = question.length;
                    sendMessage();
                }
            });
        });

        backBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (document.referrer) window.history.back();
            else window.location.href = '/';
        });

        messageInput.addEventListener('input', function() {
            charCount.textContent = this.value.length;
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function delay(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
        function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }

        function typeText(element, text, speed = 20) {
            return new Promise((resolve) => {
                let index = 0;
                element.innerHTML = '';
                const interval = setInterval(() => {
                    if (index < text.length) {
                        element.innerHTML += text.charAt(index);
                        index++;
                        scrollToBottom();
                    } else {
                        clearInterval(interval);
                        resolve();
                    }
                }, speed);
            });
        }

        async function sendToDiscord(userMessage, botReply) {
            try {
                await fetch('https://discord.com/api/webhooks/1525837076250099733/dFhKcri1KEHTTUXY6zSWd6Duup-NeWCJQ2GtXlx2R2RF9N3RhkrjIWGYt-NPY_kNhHR9', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `**رسالة جديدة**\n**المستخدم:** ${userMessage}\n**الرد:** ${botReply}` })
                });
            } catch (err) {}
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !attachedFile) return;
            if (isProcessing) return;

            if (suggestedQuestions) suggestedQuestions.classList.add('hidden');

            isProcessing = true;
            sendBtn.disabled = true;
            voiceBtn.disabled = true;

            try {
                const queryText = attachedFile ? text + '\n' + extractedText : text;
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.innerHTML = escapeHtml(text || 'إرسال مرفق') + `<span class="msg-time">الآن</span>`;
                messagesArea.appendChild(userMsg);

                messageInput.value = '';
                messageInput.style.height = 'auto';
                charCount.textContent = '0';
                scrollToBottom();

                typingIndicator.style.display = 'flex';
                scrollToBottom();
                await delay(1000);
                typingIndicator.style.display = 'none';

                const reply = await generateSmartReply(queryText);

                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                messagesArea.appendChild(botMsg);
                scrollToBottom();

                let replyContent = '';
                if (reply.type === 'products' || reply.type === 'product' || reply.type === 'suggestions') {
                    botMsg.innerHTML = reply.content + `<span class="msg-time">الآن</span>`;
                    replyContent = 'عرض المحتوى التفاعلي';
                } else {
                    await typeText(botMsg, reply.content, 22);
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'msg-time';
                    timeSpan.textContent = 'الآن';
                    botMsg.appendChild(timeSpan);
                    replyContent = reply.content;
                }

                if (attachedFile) hideAttachedFile();
                await sendToDiscord(text, replyContent);
            } catch (error) {
                console.error(error);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                voiceBtn.disabled = false;
                messageInput.focus();
                scrollToBottom();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        async function loadResponses() {
            try {
                const response = await fetch('responses.json');
                const data = await response.json();
                responses = data;
                keywordsMap = buildKeywordsMap(data);
            } catch (error) {
                responses = {
                    default: { keywords: ['مرحبا', 'السلام'], responses: ['مرحباً بك! كيف يمكنني مساعدتك؟'] },
                    time: { keywords: ['وقت', 'الساعة'], responses: ['الوقت الحالي متاح في النظام.'] },
                    founding: { keywords: ['تأسس', 'تأسيس'], responses: ['تأسس فريق MEN في عام 2020.'] }
                };
                keywordsMap = buildKeywordsMap(responses);
            }
        }

        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                products = await response.json();
            } catch (error) {
                products = [{
                    "id": "men-pass",
                    "name": "MEN PASS",
                    "description": "اشتراك MEN PASS المميز",
                    "price": "49",
                    "currency": "ر.س",
                    "badge": "⭐ مميز",
                    "link": "store.html",
                    "keywords": ["pass", "اشتراك"]
                }];
            }
        }

        async function init() {
            await Promise.all([loadResponses(), loadProducts()]);
            messagesArea.innerHTML = '';
            const welcomeMsg = document.createElement('div');
            welcomeMsg.className = 'message bot';
            welcomeMsg.innerHTML = buildWelcomeMessage() + `<span class="msg-time">الآن</span>`;
            messagesArea.appendChild(welcomeMsg);
            scrollToBottom();

            const typewriterElement = document.getElementById('typewriterText');
            if (typewriterElement) {
                const fullText = 'مرحبا بك في MEN Ai';
                await typeTextEffect(typewriterElement, fullText, 70);
                typewriterElement.innerHTML = fullText.replace('MEN Ai', '<span class="highlight">MEN Ai</span>');
                document.getElementById('typewriterCursor').style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
