<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Leap - القفز في الظلام</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(20, 20, 40, 0.8) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(40, 20, 60, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(10, 10, 30, 0.9) 0%, transparent 40%);
            z-index: 0;
        }

        #gameContainer {
            position: relative;
            width: 900px;
            height: 550px;
            background: #0a0a0f;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 
                0 0 80px rgba(80, 40, 120, 0.15),
                0 0 160px rgba(40, 20, 80, 0.08),
                inset 0 0 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ===== شاشات ===== */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 30px;
            transition: all 0.5s ease;
        }

        #loginScreen {
            background: rgba(5, 5, 10, 0.92);
            backdrop-filter: blur(20px);
        }

        #gameOverScreen {
            background: rgba(5, 5, 10, 0.93);
            backdrop-filter: blur(20px);
            display: none;
        }

        /* ===== عناصر ===== */
        .game-title {
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff 0%, #8888bb 50%, #444466 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(100, 80, 200, 0.15);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .game-subtitle {
            color: rgba(255, 255, 255, 0.25);
            font-size: 1rem;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .glow-text {
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.8rem;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .input-group {
            margin: 8px 0;
            width: 85%;
            max-width: 320px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 22px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ddd;
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            transition: all 0.4s ease;
            outline: none;
            backdrop-filter: blur(10px);
        }

        .input-group input:focus {
            border-color: rgba(150, 120, 255, 0.3);
            box-shadow: 0 0 30px rgba(100, 80, 200, 0.05);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn {
            padding: 14px 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ddd;
            font-size: 1.1rem;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.4s ease;
            margin: 8px 5px;
            min-width: 160px;
            font-weight: 700;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(100, 80, 200, 0.05);
        }

        .btn-primary {
            background: rgba(120, 100, 255, 0.12);
            border-color: rgba(120, 100, 255, 0.2);
        }

        .btn-primary:hover {
            background: rgba(120, 100, 255, 0.2);
            border-color: rgba(120, 100, 255, 0.35);
            box-shadow: 0 0 60px rgba(120, 100, 255, 0.08);
        }

        .btn-danger {
            border-color: rgba(255, 80, 80, 0.2);
        }

        .btn-danger:hover {
            background: rgba(255, 80, 80, 0.1);
            border-color: rgba(255, 80, 80, 0.3);
        }

        /* ===== شريط الإحصائيات ===== */
        #statsBar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .stat-item {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item span {
            color: #fff;
            font-weight: 700;
        }

        .stat-item .highlight {
            color: #ffd700;
        }

        .stat-item .level-badge {
            background: rgba(120, 100, 255, 0.15);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(120, 100, 255, 0.15);
            color: #a99bff;
            font-size: 0.8rem;
        }

        /* ===== شاشة النهاية ===== */
        .game-over-title {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff4466, #ff6644);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .final-score-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px 50px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 15px 0;
            text-align: center;
        }

        .final-score-box .score-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.1);
        }

        .final-score-box .score-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        .level-reached {
            color: rgba(255, 255, 255, 0.2);
            font-size: 1rem;
            margin: 5px 0 15px;
        }

        .level-reached span {
            color: #a99bff;
        }

        .bonus-text {
            color: #4caf50;
            font-size: 1.1rem;
            margin: 5px 0 15px;
            padding: 8px 24px;
            background: rgba(76, 175, 80, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(76, 175, 80, 0.1);
        }

        /* ===== أنيميشن ===== */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .pulsing {
            animation: pulse 2s ease-in-out infinite;
        }

        /* ===== رموز التحكم ===== */
        .controls-hint {
            color: rgba(255, 255, 255, 0.08);
            font-size: 0.75rem;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .controls-hint kbd {
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-family: 'Cairo', sans-serif;
            color: rgba(255, 255, 255, 0.15);
        }

        /* ===== نجمة متحركة ===== */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.2;
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 0.6; transform: scale(1.2); }
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <!-- نجوم خلفية -->
    <div class="stars-container" id="starsContainer"></div>

    <canvas id="gameCanvas" width="900" height="550"></canvas>

    <!-- شاشة الدخول -->
    <div class="screen" id="loginScreen">
        <div class="game-title">DARK LEAP</div>
        <div class="game-subtitle">✦ القفز في الظلام ✦</div>
        <div class="input-group">
            <input type="text" id="playerName" placeholder="الاسم" maxlength="20" value="محارب">
        </div>
        <div class="input-group">
            <input type="text" id="playerPhone" placeholder="رقم الجوال" maxlength="15" value="0501234567">
        </div>
        <button class="btn btn-primary" onclick="startGame()">🚀 ابدأ المغامرة</button>
        <div class="controls-hint">
            <kbd>␣</kbd> <kbd>↑</kbd> <kbd>W</kbd> للقفز &nbsp;·&nbsp; اضغط الشاشة أيضاً
        </div>
        <div class="glow-text">— 5 مستويات من الظلام —</div>
    </div>

    <!-- شاشة النهاية -->
    <div class="screen" id="gameOverScreen">
        <div class="game-over-title">💀 انتهت الرحلة</div>
        <div class="final-score-box">
            <div class="score-label">النقاط</div>
            <div class="score-number" id="finalScore">0</div>
        </div>
        <div class="level-reached">المستوى: <span id="finalLevel">1</span></div>
        <div id="bonusMessage" class="bonus-text"></div>
        <div id="finalPlayerInfo" style="color:rgba(255,255,255,0.2);font-size:0.9rem;margin-bottom:15px;"></div>
        <div>
            <button class="btn" onclick="restartGame()">🔄 العب مرة أخرى</button>
            <button class="btn btn-danger" onclick="showLogin()">🏠 القائمة</button>
        </div>
    </div>

    <!-- شريط الإحصائيات -->
    <div id="statsBar">
        <div class="stat-item">👤 <span id="displayName">---</span></div>
        <div class="stat-item">⭐ <span class="highlight" id="displayScore">0</span></div>
        <div class="stat-item">🏆 <span id="displayHighScore">0</span></div>
        <div class="stat-item"><span class="level-badge" id="displayLevel">المستوى 1</span></div>
    </div>
</div>

<script>
    // ========================================================================
    //  DARK LEAP — لعبة القفز في الظلام مع مستويات ومكافآت
    // ========================================================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = 900,
        H = 550;

    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1529157218094547035/4KRu-0ND_mNGJx9ZYR9D50rhyqkdr2N5Upl_E0ufyhRGEPznDFb9T11I5Lq3KsA8Poa9';

    // ------------------- نجوم الخلفية -------------------
    (function createStars() {
        const container = document.getElementById('starsContainer');
        for (let i = 0; i < 80; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (1 + Math.random() * 2) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = (Math.random() * 5) + 's';
            star.style.animationDuration = (2 + Math.random() * 4) + 's';
            container.appendChild(star);
        }
    })();

    // ------------------- متغيرات اللعبة -------------------
    let player = {
        x: 120,
        y: 400,
        width: 28,
        height: 38,
        vy: 0,
        jumpPower: -11.5,
        gravity: 0.55,
        grounded: false
    };

    let obstacles = [];
    let coins = [];
    let particles = [];
    let score = 0;
    let highScore = 0;
    let level = 1;
    let gameRunning = false;
    let gameLoopId = null;
    let spawnTimer = 0;
    let coinSpawnTimer = 0;
    let speed = 4.5;
    let playerName = '';
    let playerPhone = '';
    let frameCount = 0;
    let distanceTraveled = 0;
    let comboCount = 0;
    let lastCoinTime = 0;

    // مستويات اللعبة
    const LEVELS = [
        { level: 1, speed: 4.5, spawnRate: 85, coinRate: 45, obstacleHeight: [20, 35], label: 'البداية' },
        { level: 2, speed: 5.8, spawnRate: 70, coinRate: 38, obstacleHeight: [22, 38], label: 'الظلام الخفيف' },
        { level: 3, speed: 7.2, spawnRate: 55, coinRate: 30, obstacleHeight: [25, 40], label: 'الظلام العميق' },
        { level: 4, speed: 8.8, spawnRate: 42, coinRate: 24, obstacleHeight: [28, 42], label: 'الظلام المطلق' },
        { level: 5, speed: 10.5, spawnRate: 30, coinRate: 18, obstacleHeight: [30, 45], label: 'قلب الظلام' },
    ];

    const keys = {};

    // ------------------- دوال الحسابات -------------------
    function getPlayerData(name) {
        try {
            const data = localStorage.getItem('darkleap_' + name);
            return data ? JSON.parse(data) : null;
        } catch { return null; }
    }

    function savePlayerData(name, phone, score) {
        const data = {
            name,
            phone,
            highScore: Math.max(score, getPlayerData(name)?.highScore || 0),
            lastScore: score,
            lastPlay: new Date().toISOString()
        };
        localStorage.setItem('darkleap_' + name, JSON.stringify(data));
        return data;
    }

    // ------------------- دوال المستوى -------------------
    function getLevelConfig() {
        let lvl = 1;
        for (let i = LEVELS.length - 1; i >= 0; i--) {
            if (score >= i * 60 + 30) {
                lvl = i + 1;
                break;
            }
        }
        if (lvl > LEVELS.length) lvl = LEVELS.length;
        return LEVELS[lvl - 1];
    }

    function updateLevel() {
        const config = getLevelConfig();
        level = config.level;
        speed = config.speed;
        document.getElementById('displayLevel').textContent = `المستوى ${level}`;
    }

    // ------------------- دوال اللعبة الأساسية -------------------
    function startGame() {
        const name = document.getElementById('playerName').value.trim();
        const phone = document.getElementById('playerPhone').value.trim();

        if (!name || !phone) {
            alert('الرجاء إدخال الاسم ورقم الجوال');
            return;
        }

        playerName = name;
        playerPhone = phone;

        const data = getPlayerData(name);
        highScore = data?.highScore || 0;

        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('gameOverScreen').style.display = 'none';

        document.getElementById('displayName').textContent = name;
        document.getElementById('displayScore').textContent = '0';
        document.getElementById('displayHighScore').textContent = highScore;

        resetGame();
        gameRunning = true;
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        gameLoop();
    }

    function resetGame() {
        player.y = 400;
        player.vy = 0;
        player.grounded = true;
        obstacles = [];
        coins = [];
        particles = [];
        score = 0;
        speed = 4.5;
        level = 1;
        spawnTimer = 0;
        coinSpawnTimer = 0;
        frameCount = 0;
        distanceTraveled = 0;
        comboCount = 0;
        document.getElementById('displayScore').textContent = '0';
        document.getElementById('displayLevel').textContent = 'المستوى 1';
        updateLevel();
    }

    function gameLoop() {
        if (!gameRunning) return;
        frameCount++;
        update();
        draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    // ------------------- التحديث -------------------
    function update() {
        // الجاذبية
        player.vy += player.gravity;
        player.y += player.vy;

        // الأرض
        if (player.y >= 400) {
            player.y = 400;
            player.vy = 0;
            player.grounded = true;
        }

        // القفز
        if (player.grounded && (keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W'])) {
            player.vy = player.jumpPower;
            player.grounded = false;
            // تأثير عند القفز
            for (let i = 0; i < 6; i++) {
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.y + player.height,
                    vx: (Math.random() - 0.5) * 3,
                    vy: -Math.random() * 2 - 1,
                    life: 20 + Math.random() * 15,
                    maxLife: 35,
                    size: 2 + Math.random() * 4,
                    color: `rgba(150,130,255,${0.1 + Math.random() * 0.1})`
                });
            }
        }

        // تحديث المستوى
        updateLevel();

        // المسافة المقطوعة
        distanceTraveled += speed * 0.05;

        // spawn العوائق
        const config = getLevelConfig();
        spawnTimer++;
        if (spawnTimer > config.spawnRate) {
            spawnObstacle(config);
            spawnTimer = 0;
        }

        // spawn العملات
        coinSpawnTimer++;
        if (coinSpawnTimer > config.coinRate) {
            spawnCoin();
            coinSpawnTimer = 0;
        }

        // تحديث العوائق
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= speed;
            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                continue;
            }
            if (checkCollision(player, obstacles[i])) {
                endGame();
                return;
            }
        }

        // تحديث العملات
        for (let i = coins.length - 1; i >= 0; i--) {
            coins[i].x -= speed;
            if (coins[i].x + coins[i].width < 0) {
                coins.splice(i, 1);
                continue;
            }
            if (checkCollision(player, coins[i])) {
                const bonus = (Date.now() - lastCoinTime < 500) ? 1.5 : 1;
                lastCoinTime = Date.now();
                const points = Math.round(10 * bonus);
                score += points;
                comboCount = (bonus > 1) ? comboCount + 1 : 1;
                document.getElementById('displayScore').textContent = score;
                coins.splice(i, 1);

                // تأثير جمع العملة
                for (let j = 0; j < 10; j++) {
                    particles.push({
                        x: player.x + player.width / 2,
                        y: player.y + player.height / 2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 15 + Math.random() * 15,
                        maxLife: 30,
                        size: 2 + Math.random() * 5,
                        color: `rgba(255,215,0,${0.3 + Math.random() * 0.5})`
                    });
                }
            }
        }

        // تحديث الجزيئات
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx || 0;
            p.y += p.vy || 0;
            p.life--;
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        // تحديث الهاي سكور
        if (score > highScore) {
            highScore = score;
            document.getElementById('displayHighScore').textContent = highScore;
        }
    }

    // ------------------- spawn -------------------
    function spawnObstacle(config) {
        const minH = config.obstacleHeight[0];
        const maxH = config.obstacleHeight[1];
        const height = minH + Math.random() * (maxH - minH);
        const width = 14 + Math.random() * 22;
        // نوع العائق (عادي أو مزدوج)
        const type = Math.random() < 0.15 ? 'double' : 'normal';

        obstacles.push({
            x: W,
            y: 410 - height,
            width: width,
            height: height,
            type: type,
            color: `hsl(240, ${5 + Math.random() * 10}%, ${8 + Math.random() * 8}%)`
        });

        // عائق مزدوج
        if (type === 'double') {
            obstacles.push({
                x: W + width + 20 + Math.random() * 30,
                y: 410 - (height * 0.7),
                width: width * 0.7,
                height: height * 0.7,
                type: 'normal',
                color: `hsl(240, ${5 + Math.random() * 10}%, ${8 + Math.random() * 8}%)`
            });
        }
    }

    function spawnCoin() {
        const yPos = 180 + Math.random() * 200;
        coins.push({
            x: W,
            y: yPos,
            width: 14,
            height: 14,
            floatOffset: Math.random() * Math.PI * 2
        });
    }

    // ------------------- التصادم -------------------
    function checkCollision(a, b) {
        const shrink = 4;
        return a.x + shrink < b.x + b.width - shrink &&
            a.x + a.width - shrink > b.x + shrink &&
            a.y + shrink < b.y + b.height - shrink &&
            a.y + a.height - shrink > b.y + shrink;
    }

    // ------------------- الرسم -------------------
    function draw() {
        // خلفية
        const grad = ctx.createRadialGradient(450, 250, 100, 450, 250, 600);
        grad.addColorStop(0, '#0d0d18');
        grad.addColorStop(1, '#050508');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // أرضية متدرجة
        const groundGrad = ctx.createLinearGradient(0, 410, 0, H);
        groundGrad.addColorStop(0, 'rgba(20,15,35,0.8)');
        groundGrad.addColorStop(0.3, 'rgba(15,10,25,0.9)');
        groundGrad.addColorStop(1, '#050508');
        ctx.fillStyle = groundGrad;
        ctx.fillRect(0, 410, W, H - 410);

        // خط أرضي متوهج
        ctx.shadowColor = 'rgba(100,80,200,0.05)';
        ctx.shadowBlur = 30;
        ctx.strokeStyle = 'rgba(100,80,200,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 410);
        ctx.lineTo(W, 410);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // شبكة خافتة
        ctx.strokeStyle = 'rgba(255,255,255,0.01)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < W; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, H);
            ctx.stroke();
        }
        for (let i = 0; i < H; i += 40) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(W, i);
            ctx.stroke();
        }

        // ---- العوائق ----
